<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تشخيص</title>
<style>
body{font-family:Tahoma;background:#050a12;color:#fff;padding:20px;}
.box{background:#0f2942;padding:15px;border-radius:10px;margin-bottom:15px;border:1px solid #e8c547;}
.ok{color:#86efac;}.fail{color:#fca5a5;}.warn{color:#fde047;}
button{background:#1e6b8a;color:#fff;border:none;padding:12px 20px;border-radius:8px;cursor:pointer;font-size:1rem;margin-top:10px;}
pre{background:#000;padding:10px;border-radius:6px;font-size:0.8rem;overflow:auto;}
</style>
</head>
<body>
<h1>🔍 تشخيص نظام التصدير</h1>

<div class="box" id="b1">⏳ فحص report-tools.js...</div>
<div class="box" id="b2">⏳ فحص report-firebase.js...</div>
<div class="box" id="b3">⏳ فحص window.trackExport...</div>
<div class="box" id="b4">⏳ فحص jsPDF...</div>

<button onclick="testExport()">🧪 جرّب تسجيل تصدير تجريبي</button>
<div class="box" id="result" style="margin-top:20px;display:none;"></div>

<script src="report-tools.js?v=3"></script>
<script type="module" src="report-firebase.js?v=12"></script>

<script>
setTimeout(() => {
  document.getElementById('b1').innerHTML = typeof getReportType === 'function' 
    ? '<span class="ok">✅ report-tools.js محمّل</span><br>Type: ' + getReportType()
    : '<span class="fail">❌ report-tools.js ما حمّل!</span>';
  
  document.getElementById('b2').innerHTML = typeof window.getFirebaseUser === 'function'
    ? '<span class="ok">✅ report-firebase.js محمّل</span><br>User: ' + (window.getFirebaseUser() ? '✅ مسجل' : '❌ مش مسجل')
    : '<span class="fail">❌ report-firebase.js ما حمّل!</span>';
  
  document.getElementById('b3').innerHTML = typeof window.trackExport === 'function'
    ? '<span class="ok">✅ window.trackExport متاحة</span>'
    : '<span class="fail">❌ window.trackExport غير متاحة!</span>';
  
  document.getElementById('b4').innerHTML = window.jspdf 
    ? '<span class="ok">✅ jsPDF محمّل</span>'
    : '<span class="warn">⚠️ jsPDF غير محمّل (طبيعي لو ما صدّرت بعد)</span>';
}, 3000);

async function testExport() {
  const r = document.getElementById('result');
  r.style.display = 'block';
  r.innerHTML = '⏳ جاري الاختبار...';
  
  if (typeof window.trackExport !== 'function') {
    r.innerHTML = '<span class="fail">❌ window.trackExport غير متاحة - السبب: report-firebase.js ما حمّل أو ما عرّف trackExport</span>';
    return;
  }
  
  try {
    const result = await window.trackExport({
      type: 'debug-test',
      title: 'اختبار تشخيصي',
      format: 'pdf'
    });
    r.innerHTML = '<span class="ok">✅ نجح التسجيل!</span><br>النتيجة: ' + JSON.stringify(result);
  } catch (e) {
    r.innerHTML = '<span class="fail">❌ خطأ: ' + e.message + '</span>';
  }
}
</script>
</body>
</html>
