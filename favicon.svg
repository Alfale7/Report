<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2942"/>
      <stop offset="100%" stop-color="#1a4a6e"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0b855"/>
      <stop offset="100%" stop-color="#b8923d"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0b855" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f0b855" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f0b855" stop-opacity="0"/>
    </linearGradient>
    <filter id="badgeGlow">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- خلفية navy مستديرة الزوايا -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- خط ذهبي رفيع علوي -->
  <rect x="8" y="1.5" width="48" height="1.5" fill="url(#goldLine)"/>

  <!-- ظل المستند -->
  <path d="M16.5 9.5 L40.5 9.5 L48.5 17.5 L48.5 46.5 L16.5 46.5 Z"
        fill="#000" opacity="0.25" filter="url(#badgeGlow)"/>

  <!-- المستند (تقرير) -->
  <path d="M16 9 L40 9 L48 17 L48 46 L16 46 Z" fill="#faf6ec"/>
  <!-- الزاوية المطوية -->
  <path d="M40 9 L48 17 L40 17 Z" fill="#d2c8af"/>

  <!-- خط العنوان (ذهبي) -->
  <rect x="20" y="20" width="18" height="2.4" rx="1.2" fill="#d4a657"/>

  <!-- 3 خطوط رمادية -->
  <rect x="20" y="26" width="22" height="2.4" rx="1.2" fill="#8ca0af"/>
  <rect x="20" y="31" width="18" height="2.4" rx="1.2" fill="#8ca0af"/>
  <rect x="20" y="36" width="14" height="2.4" rx="1.2" fill="#8ca0af"/>

  <!-- glow ذهبي خلف الشارة -->
  <circle cx="50" cy="50" r="12" fill="#f0b855" opacity="0.25" filter="url(#badgeGlow)"/>

  <!-- حلقة navy حول الشارة -->
  <circle cx="50" cy="50" r="11" fill="#0f2942"/>

  <!-- الشارة الذهبية -->
  <circle cx="50" cy="50" r="9.5" fill="url(#goldGrad)"/>

  <!-- النجمة البيضاء (5 أطراف) -->
  <polygon points="50,44.5 51.6,48.5 56,48.8 52.6,51.5 53.8,55.5 50,53.2 46.2,55.5 47.4,51.5 44,48.8 48.4,48.5"
           fill="#ffffff"/>
</svg>
