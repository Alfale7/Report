<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تقرير المنجزات</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');

        :root {
            --bg-dark: #1a262f;
            --gold: #d4af37;
            --panel-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(212, 175, 55, 0.3);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100vh;
            overflow: hidden; font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-dark); color: #fff;
        }

        .main-wrapper {
            height: 100vh; display: flex; flex-direction: column;
            padding: 5px 10px 30px 10px; box-sizing: border-box;
        }

        #report-area {
            flex: 1; display: flex; flex-direction: column;
            padding: 8px; overflow: hidden; background-color: var(--bg-dark);
        }

        header {
            background: rgba(255, 255, 255, 0.02); border: 1.2px solid var(--border-color);
            border-radius: 10px; padding: 8px; display: flex;
            justify-content: space-between; align-items: center; margin-bottom: 8px;
            flex-shrink: 0;
        }

        .header-info h1 { margin: 0; font-size: 1rem; color: var(--gold); font-weight: 900; }
        .header-info p { margin: 0; font-size: 0.75rem; opacity: 0.8; }
        .moe-logo { width: 60px; height: auto; }

        .app-grid { flex: 1; display: grid; grid-template-columns: 1fr 1.1fr; gap: 8px; overflow: hidden; }
        
        /* ضبط الشواهد لتظهر بالكامل */
        .photo-stack { display: flex; flex-direction: column; gap: 6px; overflow: hidden; }
        .photo-card {
            flex: 1; min-height: 0; background: var(--panel-bg); border: 1.2px dashed var(--border-color);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; overflow: hidden; position: relative;
        }
        .photo-card img { width: 100%; height: 100%; object-fit: contain; display: none; }
        .photo-card span { font-size: 0.65rem; color: #aaa; }

        /* ضبط الحقول لضمان ظهور حقل الاسم */
        .inputs-stack { display: flex; flex-direction: column; gap: 5px; overflow: hidden; }
        .input-item {
            background: var(--panel-bg); border-radius: 6px; padding: 4px 10px;
            border-right: 3px solid var(--gold); flex-shrink: 0;
        }
        .input-item label { display: block; font-size: 0.6rem; color: var(--gold); font-weight: bold; margin-bottom: 1px; }
        
        .input-item input, .input-item textarea {
            width: 100%; border: none; outline: none; font-family: 'Tajawal';
            font-size: 0.85rem; color: #fff; background: transparent; text-align: right;
        }

        /* حقل الطباعة الوهمي لحل مشكلة الحروف العربية */
        .print-text { display: none; white-space: pre-wrap; word-wrap: break-word; font-size: 0.85rem; color: #fff; line-height: 1.4; }

        .box-fill { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        .box-fill textarea { flex: 1; resize: none; overflow-y: auto; }

        .action-bar { margin-top: 10px; display: flex; gap: 8px; padding-bottom: 15px; flex-shrink: 0; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.85rem; }
        .btn-blue { background: #2980b9; color: white; }
        .btn-gray { background: rgba(255,255,255,0.1); color: #fff; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div id="report-area">
            <header>
                <img src="logo.png" class="moe-logo">
                <div class="header-info">
                    <h1>تـقـريـر الـفـعـالـيـة</h1>
                    <p>الإدارة العامة للتعليم</p>
                </div>
                <div style="width: 60px;"></div>
            </header>

            <div class="app-grid">
                <div class="photo-stack">
                    <div class="photo-card" onclick="openF(1)"><img id="p1"><span id="s1">+ شاهد (1)</span><input type="file" id="i1" hidden accept="image/*" onchange="preview(this, 'p1', 's1')"></div>
                    <div class="photo-card" onclick="openF(2)"><img id="p2"><span id="s2">+ شاهد (2)</span><input type="file" id="i2" hidden accept="image/*" onchange="preview(this, 'p2', 's2')"></div>
                    <div class="photo-card" onclick="openF(3)"><img id="p3"><span id="s3">+ شاهد (3)</span><input type="file" id="i3" hidden accept="image/*" onchange="preview(this, 'p3', 's3')"></div>
                </div>

                <div class="inputs-stack">
                    <div class="input-item"><label>الجهة المنفذة / الاسم</label><input type="text" placeholder="..."><div class="print-text"></div></div>
                    <div class="input-item"><label>التاريخ</label><input type="text" placeholder="..."><div class="print-text"></div></div>
                    <div class="input-item"><label>المقر</label><input type="text" placeholder="..."><div class="print-text"></div></div>
                    <div class="input-item"><label>المستهدفون</label><input type="text" placeholder="..."><div class="print-text"></div></div>
                    <div class="input-item"><label>العدد الإجمالي</label><input type="number" value="0"><div class="print-text"></div></div>
                    <div class="input-item box-fill"><label>الأهداف والتوصيات</label><textarea placeholder="اكتب هنا..."></textarea><div class="print-text"></div></div>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <button class="btn btn-gray" onclick="location.reload()">تفريغ البيانات</button>
            <button class="btn btn-blue" onclick="saveAsImage()">تحميل التقرير كصورة</button>
        </div>
    </div>

    <script>
        function openF(id) { document.getElementById('i' + id).click(); }
        function preview(input, imgId, textId) {
            if (input.files && input.files[0]) {
                const r = new FileReader();
                r.onload = e => {
                    const img = document.getElementById(imgId);
                    img.src = e.target.result; img.style.display = 'block';
                    document.getElementById(textId).style.display = 'none';
                }
                r.readAsDataURL(input.files[0]);
            }
        }

        async function saveAsImage() {
            const area = document.getElementById('report-area');
            const items = document.querySelectorAll('.input-item');
            
            items.forEach(item => {
                const input = item.querySelector('input, textarea');
                const printDiv = item.querySelector('.print-text');
                printDiv.innerText = input.value || '...';
                input.style.display = 'none';
                printDiv.style.display = 'block';
            });

            html2canvas(area, { backgroundColor: "#1a262f", scale: 3, useCORS: true }).then(canvas => {
                items.forEach(item => {
                    item.querySelector('input, textarea').style.display = 'block';
                    item.querySelector('.print-text').style.display = 'none';
                });

                const link = document.createElement('a');
                link.download = 'تقرير_فعالية.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
