<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تقرير التميز التعليمي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');

        :root {
            --bg-dark: #1a262f;
            --panel-bg: rgba(255, 255, 255, 0.05);
            --gold: #d4af37;
            --border-color: rgba(212, 175, 55, 0.3);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100vh;
            overflow: hidden; font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            direction: rtl;
        }

        .main-wrapper {
            height: 100vh; display: flex; flex-direction: column;
            padding: 8px 8px 30px 8px;
            box-sizing: border-box;
        }

        #report-area {
            flex: 1; display: flex; flex-direction: column;
            padding: 10px; overflow: hidden;
            background-color: var(--bg-dark);
        }

        header {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 6px 15px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px; flex-shrink: 0;
        }

        .header-info { text-align: center; flex: 1; }
        .header-info h1 { margin: 0; font-size: 1rem; color: var(--gold); font-weight: 900; }
        .header-info p { margin: 0; font-size: 0.8rem; opacity: 0.8; }

        .moe-logo { width: 65px; height: auto; }

        .app-grid {
            flex: 1; display: grid;
            grid-template-columns: 0.9fr 1.1fr;
            gap: 10px; overflow: hidden;
        }

        .photo-stack { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }

        .photo-card {
            height: 125px;
            background: var(--panel-bg);
            border: 1.5px dashed var(--border-color);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; overflow: hidden; flex-shrink: 0;
        }

        .photo-card img { width: 100%; height: 100%; object-fit: contain; display: none; }
        .photo-card span { font-size: 0.65rem; color: #aaa; }

        .inputs-stack { display: flex; flex-direction: column; gap: 5px; }
        .input-item {
            background: var(--panel-bg);
            border-radius: 8px;
            padding: 5px 12px;
            border-right: 4px solid var(--gold);
            text-align: right;
        }
        .input-item label { display: block; font-size: 0.6rem; color: var(--gold); font-weight: bold; margin-bottom: 2px; }
        
        /* جعل الحقول تتصرف كنص عادي يلتف تلقائياً */
        .editable-field {
            width: 100%; border: none; outline: none; font-family: 'Tajawal';
            font-size: 0.85rem; color: #fff; background: transparent;
            text-align: right; direction: rtl;
            white-space: pre-wrap;
            word-wrap: break-word;
            min-height: 1.2em;
        }

        .box-fill { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .goals-box { flex: 1; overflow-y: auto; min-height: 80px; }

        .action-bar { margin-top: 10px; display: flex; gap: 6px; flex-shrink: 0; padding-bottom: 15px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.8rem; }
        .btn-gold { background: linear-gradient(45deg, #d4af37, #aa891e); color: #1a262f; }
        .btn-blue { background: #2980b9; color: white; }
        .btn-gray { background: rgba(255,255,255,0.1); color: #fff; }

        #print-container { display: none; }

        @media print {
            body * { visibility: hidden; }
            #print-container, #print-container * { visibility: visible; }
            #print-container { position: absolute; left: 0; top: 0; width: 100%; display: block !important; }
            #print-container img { width: 100%; height: auto; }
            @page { margin: 0; size: auto; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div id="report-area">
            <header>
                <img src="logo.png" class="moe-logo" alt="logo">
                <div class="header-info">
                    <h1>تـقـريـر الـفـعـالـيـة</h1>
                    <p>الإدارة العامة للتعليم</p>
                </div>
                <div style="width: 65px;"></div>
            </header>

            <div class="app-grid">
                <div class="photo-stack">
                    <div class="photo-card" onclick="openF(1)">
                        <img id="p1"><span id="s1">+ شاهد (1)</span>
                        <input type="file" id="i1" hidden accept="image/*" onchange="preview(this, 'p1', 's1')">
                    </div>
                    <div class="photo-card" onclick="openF(2)">
                        <img id="p2"><span id="s2">+ شاهد (2)</span>
                        <input type="file" id="i2" hidden accept="image/*" onchange="preview(this, 'p2', 's2')">
                    </div>
                    <div class="photo-card" onclick="openF(3)">
                        <img id="p3"><span id="s3">+ شاهد (3)</span>
                        <input type="file" id="i3" hidden accept="image/*" onchange="preview(this, 'p3', 's3')">
                    </div>
                </div>

                <div class="inputs-stack">
                    <div class="input-item"><label>الاسم / الجهة</label>
                        <div class="editable-field" contenteditable="true" placeholder="..."></div>
                    </div>
                    <div class="input-item"><label>تاريخ التقرير</label>
                        <div class="editable-field" contenteditable="true" placeholder="..."></div>
                    </div>
                    <div class="input-item"><label>المقر</label>
                        <div class="editable-field" contenteditable="true" placeholder="..."></div>
                    </div>
                    <div class="input-item"><label>المستهدفون</label>
                        <div class="editable-field" contenteditable="true" placeholder="..."></div>
                    </div>
                    <div class="input-item"><label>العدد</label>
                        <div class="editable-field" contenteditable="true">0</div>
                    </div>
                    <div class="input-item box-fill">
                        <label>الأهداف</label>
                        <div class="editable-field goals-box" contenteditable="true" placeholder="اكتب هنا..."></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <button class="btn btn-gray" onclick="location.reload()">تفريغ</button>
            <button class="btn btn-blue" onclick="exportDoc('image')">تحميل كصورة</button>
            <button class="btn btn-gold" onclick="exportDoc('pdf')">تصدير PDF</button>
        </div>
    </div>

    <div id="print-container"></div>

    <script>
        function openF(id) { document.getElementById('i' + id).click(); }
        
        function preview(input, imgId, textId) {
            if (input.files && input.files[0]) {
                const r = new FileReader();
                r.onload = e => {
                    const img = document.getElementById(imgId);
                    img.src = e.target.result;
                    img.style.display = 'block';
                    document.getElementById(textId).style.display = 'none';
                }
                r.readAsDataURL(input.files[0]);
            }
        }

        function exportDoc(type) {
            const area = document.getElementById('report-area');
            html2canvas(area, { 
                backgroundColor: "#1a262f", 
                scale: 3, 
                useCORS: true,
                scrollX: 0,
                scrollY: 0,
                windowWidth: area.scrollWidth,
                windowHeight: area.scrollHeight
            }).then(canvas => {
                if (type === 'image') {
                    const link = document.createElement('a');
                    link.download = 'تقرير_فعالية.png';
                    link.href = canvas.toDataURL("image/png");
                    link.click();
                } else {
                    const printContainer = document.getElementById('print-container');
                    printContainer.innerHTML = '';
                    const img = document.createElement('img');
                    img.src = canvas.toDataURL("image/png");
                    printContainer.appendChild(img);
                    setTimeout(() => { window.print(); }, 500);
                }
            });
        }
    </script>
</body>
</html>
