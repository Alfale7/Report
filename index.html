<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تقرير المنجزات التعليمي</title>
    <!-- مكتبة التحميل كصورة -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');

        :root {
            --bg-dark: #1a262f;
            --gold: #d4af37;
            --panel-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(212, 175, 55, 0.3);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100vh;
            overflow: hidden; font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
        }

        .main-wrapper {
            height: 100vh; display: flex; flex-direction: column;
            padding: 10px 10px 35px 10px;
            box-sizing: border-box;
        }

        #report-area {
            flex: 1; display: flex; flex-direction: column;
            padding: 5px; overflow: hidden;
            background-color: var(--bg-dark);
        }

        header {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 8px 15px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; flex-shrink: 0;
        }

        .header-info { text-align: center; flex: 1; }
        .header-info h1 { margin: 0; font-size: 1.1rem; color: var(--gold); font-weight: 900; }
        .header-info p { margin: 0; font-size: 0.85rem; opacity: 0.9; }

        .moe-logo { width: 70px; height: auto; }

        .app-grid {
            flex: 1; display: grid;
            grid-template-columns: 0.9fr 1.1fr;
            gap: 10px; overflow: hidden;
        }

        .photo-stack { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }

        .photo-card {
            height: 130px;
            background: var(--panel-bg);
            border: 1.5px dashed var(--border-color);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; overflow: hidden; flex-shrink: 0;
        }

        .photo-card img { width: 100%; height: 100%; object-fit: contain; display: none; }
        .photo-card span { font-size: 0.75rem; color: #aaa; }

        .inputs-stack { display: flex; flex-direction: column; gap: 5px; }
        .input-item {
            background: var(--panel-bg);
            border-radius: 8px;
            padding: 5px 12px;
            border-right: 4px solid var(--gold);
        }
        .input-item label { display: block; font-size: 0.65rem; color: var(--gold); font-weight: bold; margin-bottom: 2px; }
        
        .input-item input, .input-item textarea {
            width: 100%; border: none; outline: none; font-family: 'Tajawal';
            font-size: 0.9rem; color: #fff; background: transparent;
            text-align: right; direction: rtl;
        }

        .box-fill { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .box-fill textarea { flex: 1; resize: none; min-height: 80px; overflow-y: auto; }

        .action-bar { margin-top: 10px; display: flex; gap: 10px; flex-shrink: 0; padding-bottom: 15px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.85rem; }
        .btn-gold { background: linear-gradient(45deg, #d4af37, #aa891e); color: #1a262f; }
        .btn-blue { background: #2980b9; color: white; }
        .btn-gray { background: rgba(255,255,255,0.1); color: #fff; }

        @media print {
            @page { size: A4; margin: 0; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            body, html { background-color: var(--bg-dark) !important; height: 100%; overflow: hidden !important; }
            .main-wrapper { width: 210mm; height: 297mm; padding: 10mm; box-sizing: border-box; margin: 0; }
            .btn, .action-bar { display: none !important; }
            header { background: rgba(255, 255, 255, 0.03) !important; border: 1px solid var(--border-color) !important; }
            .input-item { background: var(--panel-bg) !important; }
            .photo-card { height: 30% !important; background: var(--panel-bg) !important; }
            input, textarea { color: #fff !important; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div id="report-area">
            <header>
                <img src="logo.png" class="moe-logo" alt="logo">
                <div class="header-info">
                    <h1>تـقـريـر الـفـعـالـيـة</h1>
                    <p>الإدارة العامة للتعليم</p>
                </div>
                <div style="width: 70px;"></div>
            </header>

            <div class="app-grid">
                <div class="photo-stack">
                    <div class="photo-card" onclick="openF(1)">
                        <img id="p1"><span id="s1">+ شاهد (1)</span>
                        <input type="file" id="i1" hidden accept="image/*" onchange="preview(this, 'p1', 's1')">
                    </div>
                    <div class="photo-card" onclick="openF(2)">
                        <img id="p2"><span id="s2">+ شاهد (2)</span>
                        <input type="file" id="i2" hidden accept="image/*" onchange="preview(this, 'p2', 's2')">
                    </div>
                    <div class="photo-card" onclick="openF(3)">
                        <img id="p3"><span id="s3">+ شاهد (3)</span>
                        <input type="file" id="i3" hidden accept="image/*" onchange="preview(this, 'p3', 's3')">
                    </div>
                </div>

                <div class="inputs-stack">
                    <div class="input-item"><label>الاسم / الجهة</label><input type="text" placeholder="..."></div>
                    <div class="input-item"><label>تاريخ التقرير</label><input type="text" placeholder="..."></div>
                    <div class="input-item"><label>المقر</label><input type="text" placeholder="..."></div>
                    <div class="input-item"><label>المستهدفون</label><input type="text" placeholder="..."></div>
                    <div class="input-item"><label>العدد</label><input type="number" value="0"></div>
                    <div class="input-item box-fill"><label>الأهداف</label><textarea placeholder="..."></textarea></div>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <button class="btn btn-gray" onclick="location.reload()">تفريغ</button>
            <button class="btn btn-blue" onclick="downloadImage()">تحميل كصورة</button>
            <button class="btn btn-gold" onclick="window.print()">تصدير PDF</button>
        </div>
    </div>

    <script>
        function openF(id) { document.getElementById('i' + id).click(); }
        function preview(input, imgId, textId) {
            if (input.files && input.files[0]) {
                const r = new FileReader();
                r.onload = e => {
                    const img = document.getElementById(imgId);
                    img.src = e.target.result;
                    img.style.display = 'block';
                    document.getElementById(textId).style.display = 'none';
                }
                r.readAsDataURL(input.files[0]);
            }
        }

        // دالة التحميل كصورة (مع ملاحظة احتمالية تقطع الحروف العربية في بعض المتصفحات)
        function downloadImage() {
            const area = document.getElementById('report-area');
            html2canvas(area, { 
                backgroundColor: "#1a262f", 
                scale: 3, 
                useCORS: true 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'تقرير_فعالية.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
