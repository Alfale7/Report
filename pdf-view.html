<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عرض PDF · التقارير الذكية</title>
<meta name="description" content="عارض PDF احترافي · التقارير الذكية ksa2030.one">

<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --navy:#050a12;
  --navy-2:#0a1620;
  --teal:#2a8aab;
  --gold:#f0b855;
  --text:#eef4f8;
  --text-dim:#7d94a8;
  --border:rgba(42,138,171,0.18);
}

*{margin:0;padding:0;box-sizing:border-box;}

html, body{
  height:100%;
  overflow:hidden;
}

body{
  font-family:'Tajawal',sans-serif;
  background:var(--navy);
  color:var(--text);
  display:flex;
  flex-direction:column;
}

/* ═══ شريط علوي ═══ */
.topbar{
  background:linear-gradient(180deg, var(--navy-2), rgba(10,22,32,0.95));
  border-bottom:1px solid var(--border);
  padding:10px 16px;
  display:flex;
  align-items:center;
  gap:12px;
  flex-shrink:0;
  z-index:100;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
  flex:1;
  text-decoration:none;
  color:inherit;
}

.brand-logo{
  width:36px;
  height:36px;
  background:linear-gradient(135deg, var(--teal), var(--navy));
  border:1.5px solid var(--gold);
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--gold);
  font-weight:900;
  font-size:1.1rem;
}

.brand-text{
  display:flex;
  flex-direction:column;
}

.brand-name{
  font-weight:900;
  font-size:0.95rem;
  color:var(--text);
}

.brand-sub{
  font-size:0.7rem;
  color:var(--teal);
  font-weight:600;
}

.btn{
  background:linear-gradient(135deg, var(--gold), #d99a2b);
  color:#3d2200;
  border:none;
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
  font:700 0.85rem 'Tajawal',sans-serif;
  display:flex;
  align-items:center;
  gap:6px;
  transition:all 0.2s;
  text-decoration:none;
}

.btn:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 16px rgba(240,184,85,0.35);
}

/* ═══ منطقة العرض ═══ */
.viewer-area{
  flex:1;
  position:relative;
  background:#525659;
  overflow:hidden;
}

.pdf-frame{
  width:100%;
  height:100%;
  border:none;
}

/* ═══ Loading ═══ */
.loading{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:var(--navy);
  gap:14px;
  z-index:10;
}

.spinner{
  width:50px;
  height:50px;
  border:4px solid rgba(240,184,85,0.2);
  border-top-color:var(--gold);
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

.loading-text{
  color:var(--text-dim);
  font-size:0.95rem;
  font-weight:600;
}

/* ═══ Error ═══ */
.error{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:30px 20px;
  text-align:center;
  gap:14px;
  background:var(--navy);
  z-index:10;
}

.error-icon{
  font-size:3rem;
}

.error-title{
  font-size:1.2rem;
  font-weight:900;
  color:var(--text);
}

.error-desc{
  color:var(--text-dim);
  font-size:0.92rem;
  line-height:1.7;
  max-width:400px;
  margin-bottom:8px;
}

@media (max-width:600px){
  .brand-text{display:none;}
  .topbar{padding:10px 12px;gap:8px;}
  .btn{padding:7px 10px;font-size:0.8rem;}
}
</style>
</head>
<body>

<!-- ═══ شريط علوي ═══ -->
<div class="topbar">
  <a href="https://ksa2030.one" class="brand">
    <div class="brand-logo">ك</div>
    <div class="brand-text">
      <div class="brand-name">التقارير الذكية</div>
      <div class="brand-sub">ksa2030.one</div>
    </div>
  </a>
  
  <a href="#" class="btn" id="downloadBtn" style="display:none;" target="_blank">
    <span>⬇</span>
    <span>تنزيل</span>
  </a>
</div>

<!-- ═══ منطقة العرض ═══ -->
<div class="viewer-area">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">جاري تحميل الملف...</div>
  </div>
  
  <iframe id="pdfFrame" class="pdf-frame" style="display:none;"></iframe>
</div>

<script>
// استخراج رابط الـ PDF
const params = new URLSearchParams(window.location.search);
const pdfUrl = params.get('url') || params.get('file');

const loading = document.getElementById('loading');
const pdfFrame = document.getElementById('pdfFrame');
const downloadBtn = document.getElementById('downloadBtn');

function showError(title, desc, retryUrl) {
  loading.innerHTML = `
    <div class="error">
      <div class="error-icon">⚠️</div>
      <div class="error-title">${title}</div>
      <div class="error-desc">${desc}</div>
      ${retryUrl ? `
        <a href="${retryUrl}" class="btn" target="_blank" style="margin-top:10px;">
          <span>⬇</span>
          <span>تنزيل الملف مباشرة</span>
        </a>
      ` : ''}
      <a href="https://ksa2030.one" class="btn" style="margin-top:6px;background:transparent;color:#fff;border:1px solid var(--border);">
        <span>🏠</span>
        <span>العودة للموقع</span>
      </a>
    </div>
  `;
}

if (!pdfUrl) {
  showError('لا يوجد رابط PDF', 'لم يتم تحديد ملف PDF للعرض.');
} else {
  // إعداد زر التنزيل
  downloadBtn.href = pdfUrl;
  downloadBtn.style.display = 'flex';
  
  // 🆕 الحل: استخدام Mozilla PDF.js Web Viewer مباشرة
  // مستضاف على mozilla.github.io - يتعامل مع PDFs بشكل احترافي
  const mozillaViewer = `https://mozilla.github.io/pdf.js/web/viewer.html?file=${encodeURIComponent(pdfUrl)}`;
  
  pdfFrame.src = mozillaViewer;
  
  // إخفاء loading لما الـ iframe يحمل
  pdfFrame.onload = function() {
    setTimeout(() => {
      loading.style.display = 'none';
      pdfFrame.style.display = 'block';
    }, 500);
  };
  
  // Fallback: إذا فشل بعد 20 ثانية، اعرض خيار التنزيل
  setTimeout(function() {
    if (loading.style.display !== 'none') {
      showError(
        'يستغرق التحميل وقتاً طويلاً',
        'إذا لم يتم العرض، يمكنك تنزيل الملف مباشرة.',
        pdfUrl
      );
    }
  }, 20000);
}
</script>

</body>
</html>
