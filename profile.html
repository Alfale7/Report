<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>لوحة التحكم · ksa2030</title>
<meta name="theme-color" content="#050a12">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Reem+Kufi:wght@400;500;600;700&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg-deep: #050a12;
  --bg-mid: #0a1620;
  --bg-card: #0f2942;
  --green: #4caf50;
  --green-dim: #2a9d8f;
  --blue: #3b6db5;
  --gold: #e8c547;
  --gold-deep: #d4a657;
  --teal: #1e6b8a;
  --teal-bright: #2a8aab;
  --text-dim: rgba(255, 255, 255, 0.7);
  --text-mute: rgba(255, 255, 255, 0.5);
  --border: rgba(255, 255, 255, 0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  font-family: 'Tajawal', 'Tahoma', sans-serif;
  min-height: 100vh;
  background: var(--bg-deep);
  color: #fff;
  -webkit-font-smoothing: antialiased;
}

/* 🌌 الخلفية */
.bg-layer { position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse at top right, rgba(76, 175, 80, 0.15) 0%, transparent 50%),
    radial-gradient(ellipse at top left, rgba(59, 109, 181, 0.15) 0%, transparent 50%),
    radial-gradient(ellipse at bottom center, rgba(232, 197, 71, 0.08) 0%, transparent 60%),
    linear-gradient(180deg, #050a12 0%, #0a1620 50%, #050a12 100%);
}
.bg-grid { position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
  background-size: 40px 40px; pointer-events: none;
}
.orb { position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.5; animation: orbDrift 24s ease-in-out infinite; }
.orb-1 { top: 5%; right: -10%; width: 320px; height: 320px; background: radial-gradient(circle, rgba(76, 175, 80, 0.4), transparent); }
.orb-2 { top: 30%; left: -15%; width: 350px; height: 350px; background: radial-gradient(circle, rgba(59, 109, 181, 0.35), transparent); animation-delay: -8s; }
.orb-3 { bottom: 10%; right: 30%; width: 280px; height: 280px; background: radial-gradient(circle, rgba(232, 197, 71, 0.25), transparent); animation-delay: -16s; }
@keyframes orbDrift {
  0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.5; }
  50% { transform: translate(20px, -25px) scale(1.05); opacity: 0.65; }
}

/* 🎯 شريط علوي */
.top-nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(5, 10, 18, 0.85);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
}
.top-nav-inner {
  max-width: 1280px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; }
.nav-brand-mark {
  width: 38px; height: 38px; border-radius: 11px;
  background: linear-gradient(135deg, #4caf50 0%, #2a9d8f 50%, #1a7a8a 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.05rem;
  box-shadow: 0 6px 16px rgba(76, 175, 80, 0.35);
}
.nav-brand-text {
  font: 800 1.15rem 'Aref Ruqaa', serif;
  background: linear-gradient(135deg, #fff 0%, #e8c547 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.nav-actions { display: flex; align-items: center; gap: 8px; }
.nav-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid var(--border);
  color: var(--text-dim);
  border-radius: 10px;
  font: 600 0.82rem 'Tajawal', sans-serif;
  text-decoration: none; cursor: pointer; transition: all 0.2s;
}
.nav-btn:hover { background: rgba(255, 255, 255, 0.1); color: #fff; border-color: rgba(255, 255, 255, 0.2); }
.nav-btn-logout {
  background: rgba(220, 38, 38, 0.1) !important;
  border-color: rgba(220, 38, 38, 0.3) !important;
  color: #fca5a5 !important;
}
.nav-btn-logout:hover { background: rgba(220, 38, 38, 0.18) !important; color: #fff !important; }

/* 💎 المحتوى الرئيسي */
.page { max-width: 1280px; margin: 0 auto; padding: 30px 20px 60px; position: relative; z-index: 1; }

/* 👤 رأس البروفايل */
.profile-header {
  background: linear-gradient(145deg, rgba(15, 41, 66, 0.92), rgba(10, 22, 32, 0.85));
  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%);
  border: 1px solid rgba(232, 197, 71, 0.2);
  border-radius: 24px;
  padding: 28px;
  margin-bottom: 24px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 22px;
  align-items: center;
  box-shadow: 0 28px 80px rgba(0, 0, 0, 0.5);
  position: relative;
  overflow: hidden;
}
.profile-header::before {
  content: ''; position: absolute;
  top: -30%; right: -10%;
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(232, 197, 71, 0.18), transparent 70%);
  pointer-events: none;
  animation: profileGlow 4s ease-in-out infinite;
}
@keyframes profileGlow {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.15); }
}
.profile-avatar {
  width: 90px; height: 90px;
  border-radius: 50%;
  background: linear-gradient(135deg, #4caf50 0%, #2a9d8f 50%, #1a7a8a 100%);
  display: flex; align-items: center; justify-content: center;
  font: 800 2.4rem 'Aref Ruqaa', serif;
  color: #fff;
  box-shadow: 0 12px 32px rgba(76, 175, 80, 0.4), inset 0 2px 0 rgba(255, 255, 255, 0.2);
  position: relative; z-index: 1;
  flex-shrink: 0;
}
.profile-info { position: relative; z-index: 1; min-width: 0; }
.profile-name {
  font: 800 1.45rem 'Aref Ruqaa', serif;
  background: linear-gradient(135deg, #fff 0%, #e8c547 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.profile-email {
  font: 600 0.88rem 'Tajawal', sans-serif;
  color: var(--text-dim);
  margin-bottom: 8px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.profile-badges { display: flex; gap: 6px; flex-wrap: wrap; }
.profile-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px;
  background: linear-gradient(135deg, rgba(232, 197, 71, 0.15), rgba(212, 166, 87, 0.1));
  border: 1px solid rgba(232, 197, 71, 0.35);
  color: #e8c547;
  border-radius: 99px;
  font: 700 0.72rem 'Reem Kufi', sans-serif;
}
.profile-badge.free {
  background: rgba(255, 255, 255, 0.05);
  border-color: rgba(255, 255, 255, 0.15);
  color: var(--text-dim);
}
.profile-badge.lifetime {
  background: linear-gradient(135deg, #e8c547, #d4a657);
  color: #050a12;
  border-color: transparent;
  font-weight: 900;
  box-shadow: 0 4px 12px rgba(232, 197, 71, 0.35);
}
.profile-actions { display: flex; gap: 8px; flex-direction: column; position: relative; z-index: 1; }
.profile-action-btn {
  padding: 10px 16px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid var(--border);
  color: #fff;
  border-radius: 10px;
  font: 700 0.82rem 'Tajawal', sans-serif;
  cursor: pointer;
  text-decoration: none;
  text-align: center;
  transition: all 0.2s;
  white-space: nowrap;
}
.profile-action-btn:hover { background: rgba(255, 255, 255, 0.12); border-color: rgba(255, 255, 255, 0.25); }
.profile-action-btn.primary {
  background: linear-gradient(135deg, #1e6b8a, #2a8aab, #d4a657);
  border-color: transparent;
  box-shadow: 0 6px 18px rgba(30, 107, 138, 0.4);
}

/* 📊 شبكة الإحصائيات */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 24px;
}
.stat-card {
  background: linear-gradient(145deg, rgba(15, 41, 66, 0.9), rgba(10, 22, 32, 0.85));
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
}
.stat-card:hover { transform: translateY(-4px); border-color: rgba(232, 197, 71, 0.25); }
.stat-icon {
  width: 44px; height: 44px;
  border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
  margin-bottom: 10px;
  background: linear-gradient(135deg, var(--teal), var(--teal-bright));
  box-shadow: 0 6px 16px rgba(30, 107, 138, 0.4);
}
.stat-card:nth-child(2) .stat-icon { background: linear-gradient(135deg, var(--gold), var(--gold-deep)); box-shadow: 0 6px 16px rgba(232, 197, 71, 0.4); }
.stat-card:nth-child(3) .stat-icon { background: linear-gradient(135deg, var(--green), var(--green-dim)); box-shadow: 0 6px 16px rgba(76, 175, 80, 0.4); }
.stat-card:nth-child(4) .stat-icon { background: linear-gradient(135deg, #8b5cf6, #6d28d9); box-shadow: 0 6px 16px rgba(139, 92, 246, 0.4); }
.stat-num {
  font: 900 1.8rem 'Reem Kufi', sans-serif;
  background: linear-gradient(135deg, #fff, #e8c547);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}
.stat-label {
  font: 600 0.78rem 'Tajawal', sans-serif;
  color: var(--text-dim);
  margin-top: 4px;
}

/* 🎯 شريط التبويبات */
.tabs-wrap {
  background: rgba(15, 41, 66, 0.6);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 6px;
  margin-bottom: 20px;
  display: flex;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs-wrap::-webkit-scrollbar { display: none; }
.tab-btn {
  flex: 1;
  min-width: max-content;
  padding: 12px 18px;
  background: transparent;
  border: none;
  color: var(--text-dim);
  border-radius: 11px;
  font: 700 0.88rem 'Tajawal', sans-serif;
  cursor: pointer;
  transition: all 0.25s ease;
  display: inline-flex; align-items: center; gap: 8px;
  justify-content: center;
  white-space: nowrap;
}
.tab-btn:hover { color: #fff; background: rgba(255, 255, 255, 0.04); }
.tab-btn.active {
  background: linear-gradient(135deg, #1e6b8a, #2a8aab, #d4a657);
  color: #fff;
  box-shadow: 0 6px 18px rgba(30, 107, 138, 0.4);
}
.tab-btn .badge {
  background: rgba(255, 255, 255, 0.15);
  color: #fff;
  padding: 2px 8px;
  border-radius: 99px;
  font-size: 0.7rem;
  font-weight: 800;
}
.tab-btn.active .badge { background: rgba(255, 255, 255, 0.25); }

/* 📦 المحتوى */
.tab-panel { display: none; animation: tabFadeIn 0.4s ease-out; }
.tab-panel.active { display: block; }
@keyframes tabFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.panel-card {
  background: linear-gradient(145deg, rgba(15, 41, 66, 0.92), rgba(10, 22, 32, 0.85));
  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 24px;
  box-shadow: 0 28px 80px rgba(0, 0, 0, 0.4);
}
.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
}
.panel-title {
  font: 800 1.2rem 'Reem Kufi', sans-serif;
  color: #fff;
  display: flex; align-items: center; gap: 10px;
}
.panel-title-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--teal), var(--gold-deep));
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.05rem;
}

/* 📋 قائمة العناصر */
.items-list { display: flex; flex-direction: column; gap: 10px; }
.item-row {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 14px;
  align-items: center;
  padding: 14px 16px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border);
  border-radius: 14px;
  transition: all 0.25s ease;
}
.item-row:hover {
  background: rgba(232, 197, 71, 0.06);
  border-color: rgba(232, 197, 71, 0.2);
  transform: translateX(-4px);
}
.item-icon {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, var(--teal), var(--teal-bright));
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
  flex-shrink: 0;
}
.item-info { min-width: 0; }
.item-title {
  font: 700 0.95rem 'Tajawal', sans-serif;
  color: #fff;
  margin-bottom: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.item-meta {
  font: 500 0.78rem 'Tajawal', sans-serif;
  color: var(--text-mute);
  display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap;
}
.item-meta-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px;
  background: rgba(76, 175, 80, 0.12);
  color: #86efac;
  border-radius: 99px;
  font-size: 0.7rem;
  font-weight: 700;
}
.item-actions { display: flex; gap: 6px; flex-shrink: 0; }
.item-action {
  width: 36px; height: 36px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid var(--border);
  color: var(--text-dim);
  border-radius: 9px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.95rem;
  transition: all 0.2s;
}
.item-action:hover { background: rgba(255, 255, 255, 0.12); color: #fff; }
.item-action.danger:hover { background: rgba(220, 38, 38, 0.15); color: #fca5a5; border-color: rgba(220, 38, 38, 0.3); }
.item-action.primary {
  background: linear-gradient(135deg, var(--teal), var(--gold-deep));
  color: #fff;
  border-color: transparent;
}

/* 🌟 حالة فارغة */
.empty-state {
  text-align: center;
  padding: 60px 20px;
}
.empty-icon {
  width: 80px; height: 80px;
  margin: 0 auto 18px;
  background: linear-gradient(135deg, rgba(232, 197, 71, 0.15), rgba(212, 166, 87, 0.1));
  border: 1px solid rgba(232, 197, 71, 0.3);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 2.4rem;
}
.empty-title {
  font: 800 1.1rem 'Reem Kufi', sans-serif;
  color: #fff;
  margin-bottom: 8px;
}
.empty-text {
  font: 500 0.92rem 'Tajawal', sans-serif;
  color: var(--text-dim);
  max-width: 400px;
  margin: 0 auto 22px;
}
.empty-cta {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 24px;
  background: linear-gradient(135deg, #1e6b8a, #2a8aab, #d4a657);
  color: #fff;
  border-radius: 12px;
  font: 800 0.92rem 'Tajawal', sans-serif;
  text-decoration: none;
  box-shadow: 0 8px 22px rgba(30, 107, 138, 0.4);
  transition: all 0.2s;
}
.empty-cta:hover { transform: translateY(-2px); }

/* 🎨 شبكة المفضلة */
.fav-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
}
.fav-card {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px;
  text-decoration: none;
  color: #fff;
  display: flex; flex-direction: column; gap: 8px;
  transition: all 0.25s ease;
  position: relative;
}
.fav-card:hover {
  background: rgba(232, 197, 71, 0.08);
  border-color: rgba(232, 197, 71, 0.3);
  transform: translateY(-3px);
}
.fav-card-icon { font-size: 2rem; }
.fav-card-title { font: 700 0.95rem 'Tajawal', sans-serif; }
.fav-card-meta { font: 500 0.75rem 'Tajawal', sans-serif; color: var(--text-mute); }
.fav-remove {
  position: absolute; top: 10px; left: 10px;
  width: 28px; height: 28px;
  background: rgba(220, 38, 38, 0.1);
  border: 1px solid rgba(220, 38, 38, 0.3);
  color: #fca5a5;
  border-radius: 8px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem;
  transition: all 0.2s;
}
.fav-remove:hover { background: rgba(220, 38, 38, 0.25); color: #fff; }

/* ⏳ Loading */
.loading {
  display: flex; align-items: center; justify-content: center;
  padding: 40px;
}
.spinner {
  width: 40px; height: 40px;
  border: 4px solid rgba(232, 197, 71, 0.2);
  border-top-color: #e8c547;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 📱 Responsive */
@media (max-width: 768px) {
  .profile-header { grid-template-columns: 1fr; gap: 18px; text-align: center; }
  .profile-info { text-align: center; }
  .profile-badges { justify-content: center; }
  .profile-actions { flex-direction: row; justify-content: center; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .stat-num { font-size: 1.5rem; }
  .item-row { grid-template-columns: auto 1fr; }
  .item-actions { grid-column: 1 / -1; justify-content: flex-end; margin-top: 8px; }
}
@media (max-width: 480px) {
  .top-nav { padding: 12px 14px; }
  .nav-brand-text { font-size: 1rem; }
  .nav-btn { padding: 7px 10px; font-size: 0.75rem; }
  .page { padding: 18px 12px 40px; }
  .profile-header, .panel-card { padding: 20px 16px; border-radius: 18px; }
  .profile-name { font-size: 1.2rem; }
  .tab-btn { padding: 10px 12px; font-size: 0.8rem; }
}

/* 🎊 Toast Notification */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(120%);
  background: linear-gradient(135deg, #16a34a, #15803d);
  color: #fff;
  padding: 14px 24px;
  border-radius: 12px;
  font: 700 0.9rem 'Tajawal', sans-serif;
  box-shadow: 0 12px 32px rgba(22, 163, 74, 0.4);
  z-index: 1000;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  max-width: 90%;
  text-align: center;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { background: linear-gradient(135deg, #dc2626, #991b1b); box-shadow: 0 12px 32px rgba(220, 38, 38, 0.4); }
</style>
</head>
<body>

<!-- 🌌 الخلفية -->
<div class="bg-layer"></div>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- 🎯 الشريط العلوي -->
<nav class="top-nav">
  <div class="top-nav-inner">
    <a href="index.html" class="nav-brand">
      <div class="nav-brand-mark">📚</div>
      <div class="nav-brand-text">ksa2030</div>
    </a>
    <div class="nav-actions">
      <a href="index.html" class="nav-btn">
        <span>🏠</span>
        <span>الرئيسية</span>
      </a>
      <button class="nav-btn nav-btn-logout" onclick="handleLogout()">
        <span>🚪</span>
        <span>خروج</span>
      </button>
    </div>
  </div>
</nav>

<!-- 💎 المحتوى -->
<main class="page">

  <!-- 👤 رأس البروفايل -->
  <header class="profile-header">
    <div class="profile-avatar" id="profileAvatar">؟</div>
    <div class="profile-info">
      <h1 class="profile-name" id="profileName">جاري التحميل...</h1>
      <div class="profile-email" id="profileEmail">--</div>
      <div class="profile-badges" id="profileBadges"></div>
    </div>
    <div class="profile-actions">
      <a href="pay.html" class="profile-action-btn primary" id="upgradeBtn" style="display:none;">
        💎 الترقية
      </a>
    </div>
  </header>

  <!-- 📊 إحصائيات -->
  <section class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon">📋</div>
      <div class="stat-num" id="statExports">0</div>
      <div class="stat-label">تقارير مُصدّرة</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">⭐</div>
      <div class="stat-num" id="statFavorites">0</div>
      <div class="stat-label">قوالب مفضلة</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🔗</div>
      <div class="stat-num" id="statShares">0</div>
      <div class="stat-label">مشاركات</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">👁️</div>
      <div class="stat-num" id="statViews">0</div>
      <div class="stat-label">مشاهدات</div>
    </div>
  </section>

  <!-- 🎯 التبويبات -->
  <div class="tabs-wrap">
    <button class="tab-btn active" onclick="switchTab('exports')" data-tab="exports">
      <span>📋</span>
      <span>سجل التصدير</span>
      <span class="badge" id="exportsBadge">0</span>
    </button>
    <button class="tab-btn" onclick="switchTab('favorites')" data-tab="favorites">
      <span>⭐</span>
      <span>المفضلة</span>
      <span class="badge" id="favoritesBadge">0</span>
    </button>
    <button class="tab-btn" onclick="switchTab('shares')" data-tab="shares">
      <span>🔗</span>
      <span>المشاركات</span>
      <span class="badge" id="sharesBadge">0</span>
    </button>
  </div>

  <!-- 📋 سجل التصدير -->
  <div class="tab-panel active" id="panel-exports">
    <div class="panel-card">
      <div class="panel-header">
        <h2 class="panel-title">
          <span class="panel-title-icon">📋</span>
          <span>تقاريرك المُصدّرة</span>
        </h2>
      </div>
      <div id="exportsContent">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- ⭐ المفضلة -->
  <div class="tab-panel" id="panel-favorites">
    <div class="panel-card">
      <div class="panel-header">
        <h2 class="panel-title">
          <span class="panel-title-icon">⭐</span>
          <span>قوالبك المفضلة</span>
        </h2>
      </div>
      <div id="favoritesContent">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- 🔗 المشاركات -->
  <div class="tab-panel" id="panel-shares">
    <div class="panel-card">
      <div class="panel-header">
        <h2 class="panel-title">
          <span class="panel-title-icon">🔗</span>
          <span>تقاريرك المشاركة</span>
        </h2>
      </div>
      <div id="sharesContent">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

</main>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- JavaScript -->
<script type="module">
import { 
  onUserChange, logout, getUserProfile,
  getExportHistory, deleteExportLog,
  getFavorites, toggleFavorite,
  getUserShares, deleteShare,
  isLifetime
} from './firebase-config.js?v=5';

let _user = null;
let _profile = null;

// 🚪 تسجيل خروج
window.handleLogout = async function() {
  if (!confirm('هل تريد تسجيل الخروج؟')) return;
  try {
    await logout();
    window.location.href = 'index.html';
  } catch (err) {
    showToast('خطأ في تسجيل الخروج', 'error');
  }
};

// 🎊 Toast
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type === 'error' ? ' error' : '') + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

// 🎯 تبديل التبويبات
window.switchTab = function(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${tab}`));
};

// 👤 تحميل بيانات المستخدم
onUserChange(async (data) => {
  _user = data?.user;
  
  if (!_user) {
    window.location.href = 'login.html?next=profile.html';
    return;
  }
  
  _profile = data?.profile || await getUserProfile(_user.uid).then(r => r.profile);
  renderProfile();
  loadAllData();
});

function renderProfile() {
  // الاسم
  const displayName = _profile?.displayName || _user.email?.split('@')[0] || 'مستخدم';
  document.getElementById('profileName').textContent = displayName;
  document.getElementById('profileEmail').textContent = _user.email || '--';
  
  // Avatar
  const firstLetter = displayName.charAt(0).toUpperCase();
  document.getElementById('profileAvatar').textContent = firstLetter;
  
  // Badges
  const badgesEl = document.getElementById('profileBadges');
  const lifetime = isLifetime(_profile);
  badgesEl.innerHTML = '';
  
  if (lifetime) {
    badgesEl.innerHTML += '<span class="profile-badge lifetime">💎 اشتراك مدى الحياة</span>';
  } else {
    badgesEl.innerHTML += '<span class="profile-badge free">📋 الخطة المجانية</span>';
    document.getElementById('upgradeBtn').style.display = 'inline-block';
  }
  
  if (_profile?.isAdmin) {
    badgesEl.innerHTML += '<span class="profile-badge">🛡️ مدير</span>';
  }
}

async function loadAllData() {
  // تحميل بالتوازي
  const [exportsRes, favsRes, sharesRes] = await Promise.all([
    getExportHistory(),
    getFavorites(),
    getUserShares()
  ]);
  
  const exports = exportsRes.exports || [];
  const favorites = favsRes.favorites || [];
  const shares = sharesRes.shares || [];
  
  // إحصائيات
  document.getElementById('statExports').textContent = exports.length;
  document.getElementById('statFavorites').textContent = favorites.length;
  document.getElementById('statShares').textContent = shares.length;
  
  let totalViews = 0;
  shares.forEach(s => totalViews += (s.views || 0));
  document.getElementById('statViews').textContent = totalViews;
  
  // البادجات
  document.getElementById('exportsBadge').textContent = exports.length;
  document.getElementById('favoritesBadge').textContent = favorites.length;
  document.getElementById('sharesBadge').textContent = shares.length;
  
  renderExports(exports);
  renderFavorites(favorites);
  renderShares(shares);
}

// 📋 عرض سجل التصدير
function renderExports(exports) {
  const c = document.getElementById('exportsContent');
  if (!exports.length) {
    c.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-title">ما عندك تقارير مُصدّرة بعد</div>
        <div class="empty-text">صدّر أول تقرير وراح يظهر هنا تلقائياً!</div>
        <a href="index.html" class="empty-cta">
          <span>🚀</span>
          <span>استكشف القوالب</span>
        </a>
      </div>
    `;
    return;
  }
  
  c.innerHTML = '<div class="items-list">' + exports.map(e => {
    const date = e.exportedAt?.toDate?.() || e.createdAt?.toDate?.() || new Date();
    const dateStr = date.toLocaleDateString('ar-SA', { year: 'numeric', month: 'long', day: 'numeric' });
    const formatIcon = e.format === 'png' ? '🖼️' : '📄';
    return `
      <div class="item-row">
        <div class="item-icon">📋</div>
        <div class="item-info">
          <div class="item-title">${escapeHtml(e.title)}</div>
          <div class="item-meta">
            <span>📅 ${dateStr}</span>
            <span class="item-meta-pill">${formatIcon} ${e.format?.toUpperCase() || 'PDF'}</span>
          </div>
        </div>
        <div class="item-actions">
          <button class="item-action danger" onclick="deleteExport('${e.id}')" title="حذف">🗑️</button>
        </div>
      </div>
    `;
  }).join('') + '</div>';
}

window.deleteExport = async function(id) {
  if (!confirm('هل تريد حذف هذا السجل؟')) return;
  const r = await deleteExportLog(id);
  if (r.success) {
    showToast('✅ تم الحذف');
    loadAllData();
  } else {
    showToast('فشل الحذف', 'error');
  }
};

// ⭐ عرض المفضلة
function renderFavorites(favorites) {
  const c = document.getElementById('favoritesContent');
  if (!favorites.length) {
    c.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⭐</div>
        <div class="empty-title">ما عندك قوالب مفضلة بعد</div>
        <div class="empty-text">اضغط ⭐ على أي قالب في الصفحة الرئيسية لإضافته للمفضلة</div>
        <a href="index.html" class="empty-cta">
          <span>🎨</span>
          <span>تصفح القوالب</span>
        </a>
      </div>
    `;
    return;
  }
  
  c.innerHTML = '<div class="fav-grid">' + favorites.map(f => `
    <a href="${escapeHtml(f.url)}" class="fav-card">
      <button class="fav-remove" onclick="event.preventDefault();removeFavorite('${escapeHtml(f.templateId)}')" title="حذف">✕</button>
      <div class="fav-card-icon">${escapeHtml(f.icon || '📋')}</div>
      <div class="fav-card-title">${escapeHtml(f.title)}</div>
      <div class="fav-card-meta">${escapeHtml(f.category || 'عام')}</div>
    </a>
  `).join('') + '</div>';
}

window.removeFavorite = async function(templateId) {
  const r = await toggleFavorite(templateId);
  if (r.success) {
    showToast('💔 تم حذف من المفضلة');
    loadAllData();
  } else {
    showToast('فشل الحذف', 'error');
  }
};

// 🔗 عرض المشاركات
function renderShares(shares) {
  const c = document.getElementById('sharesContent');
  if (!shares.length) {
    c.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔗</div>
        <div class="empty-title">ما عندك مشاركات بعد</div>
        <div class="empty-text">شارك تقاريرك مع زملائك من خلال رابط، ويظهرون هنا</div>
        <a href="index.html" class="empty-cta">
          <span>📤</span>
          <span>أنشئ تقرير</span>
        </a>
      </div>
    `;
    return;
  }
  
  c.innerHTML = '<div class="items-list">' + shares.map(s => {
    const date = s.createdAt?.toDate?.() || new Date();
    const dateStr = date.toLocaleDateString('ar-SA');
    const shareUrl = `https://ksa2030.one/view.html?id=${s.id}`;
    return `
      <div class="item-row">
        <div class="item-icon">🔗</div>
        <div class="item-info">
          <div class="item-title">${escapeHtml(s.title)}</div>
          <div class="item-meta">
            <span>📅 ${dateStr}</span>
            <span class="item-meta-pill">👁️ ${s.views || 0} مشاهدة</span>
          </div>
        </div>
        <div class="item-actions">
          <button class="item-action primary" onclick="copyShare('${shareUrl}')" title="نسخ الرابط">📋</button>
          <a href="${shareUrl}" target="_blank" class="item-action" title="عرض">👁️</a>
          <button class="item-action danger" onclick="removeShare('${s.id}')" title="حذف">🗑️</button>
        </div>
      </div>
    `;
  }).join('') + '</div>';
}

window.copyShare = async function(url) {
  try {
    await navigator.clipboard.writeText(url);
    showToast('✅ تم نسخ الرابط!');
  } catch {
    showToast('فشل النسخ', 'error');
  }
};

window.removeShare = async function(id) {
  if (!confirm('هل تريد حذف هذه المشاركة؟ سيتعذّر الوصول للرابط بعد الحذف.')) return;
  const r = await deleteShare(id);
  if (r.success) {
    showToast('✅ تم حذف المشاركة');
    loadAllData();
  } else {
    showToast('فشل الحذف', 'error');
  }
};

// 🛡️ Escape HTML
function escapeHtml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
</script>

</body>
</html>
