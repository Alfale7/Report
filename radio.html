<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<meta name="theme-color" content="#0b3946">
<title>الإذاعة المدرسية الأسبوعية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Reem+Kufi:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{color-scheme:light only;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

html,body{
  font-family:'Tajawal','Tahoma','Arial',sans-serif;
  background:linear-gradient(135deg, #e8e9e3 0%, #dcded6 100%);
  color:#16323a;
  width:100%;
  overflow-x:hidden;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:14px 0 30px;
  -webkit-font-smoothing:antialiased;
}

#page{
  width:100%;
  max-width:540px;
  background:#fff;
  position:relative;
  box-shadow:0 8px 28px rgba(11,57,70,0.15), 0 0 0 1px rgba(11,57,70,0.18);
  border-radius:6px;
  overflow:hidden;
}

.top-stripe{
  height:8px;
  background:linear-gradient(90deg, #0b3946 0%, #2c979d 50%, #0b3946 100%);
}

.header{
  background:linear-gradient(135deg, #0b3946 0%, #2c979d 100%);
  padding:16px 20px 14px;
  position:relative;
  overflow:hidden;
}
.header::before{
  content:"";
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  background-image:radial-gradient(circle at 90% 10%, rgba(255,255,255,0.12), transparent 60%);
  pointer-events:none;
}
.logo-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  position:relative;
  z-index:1;
}
.muh-text{text-align:right;color:#fff;}
.muh-text .l1{font-size:0.7rem;font-weight:900;line-height:1.3;}
.muh-text .l2{font-size:0.6rem;color:#69cee3;font-weight:600;}

.title-block{
  text-align:center;
  flex:1;
  padding:0 8px;
}
.title-ar{
  font-family:'Reem Kufi','Tajawal',sans-serif;
  font-size:1.15rem;
  font-weight:700;
  color:#fff;
  letter-spacing:0.5px;
  line-height:1.2;
}
.title-en{
  font-size:0.55rem;
  font-weight:700;
  color:rgba(255,255,255,0.85);
  letter-spacing:2px;
  text-transform:uppercase;
  margin-top:3px;
}

.icon-badge{
  background:rgba(255,255,255,0.2);
  border:1.5px solid rgba(255,255,255,0.3);
  border-radius:10px;
  padding:6px 10px;
  text-align:center;
  flex-shrink:0;
}
.icon-badge .icon{font-size:1.3rem;line-height:1;}
.icon-badge .lbl{font-size:0.55rem;color:#fff;font-weight:700;margin-top:1px;}

.zone{
  margin:14px;
  background:#fff;
  border-radius:10px;
  border:1px solid rgba(11,57,70,0.18);
  overflow:hidden;
  box-shadow:0 2px 8px rgba(11,57,70,0.05);
}
.zone-head{
  background:linear-gradient(135deg, #0b3946, #2c979d);
  padding:9px 14px;
  display:flex;
  align-items:center;
  gap:9px;
  color:#fff;
}
.zone-icon{
  width:24px;
  height:24px;
  background:rgba(255,255,255,0.25);
  border:1.5px solid rgba(255,255,255,0.4);
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:0.8rem;
  font-weight:900;
  flex-shrink:0;
}
.zone-title{
  font-family:'Reem Kufi','Tajawal',sans-serif;
  font-size:0.92rem;
  font-weight:700;
  flex:1;
}
.zone-body{padding:12px 14px;}

.fields{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.field{
  background:#f3f4ef;
  border:1px solid rgba(11,57,70,0.18);
  border-right:3px solid #2c979d;
  border-radius:6px;
  padding:8px 11px;
  transition:all 0.2s;
}
.field:focus-within{
  border-color:#0b3946;
  border-right-color:#0b3946;
  background:#fff;
  box-shadow:0 0 0 2px rgba(11,57,70,0.15);
}
.field-label{
  font-size:0.68rem;
  font-weight:800;
  color:#0b3946;
  margin-bottom:3px;
}
.field input,.field textarea{
  width:100%;
  border:none;
  background:transparent;
  font-family:inherit;
  font-size:0.85rem;
  font-weight:600;
  color:#16323a;
  outline:none;
  resize:none;
  line-height:1.5;
}
.field input::placeholder,.field textarea::placeholder{color:#5a6a6e;opacity:0.55;}
.field-full{grid-column:1 / -1;}

/* فقرات المحتوى الديناميكية */
.content-block{
  border:1px dashed rgba(11,57,70,0.3);
  border-radius:10px;
  padding:8px 10px;
  margin-bottom:8px;
  background:rgba(11,57,70,0.02);
}
.content-head{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:4px;
}
.content-label{
  flex:1;
  font-size:0.72rem !important;
  font-weight:800 !important;
  color:#0b3946 !important;
}
.content-label::placeholder{color:#0b3946;opacity:0.45;}
.content-del{
  flex:0 0 auto;
  width:24px;height:24px;
  border:none;border-radius:50%;
  background:#cfe9e7;color:#0b3946;
  font-size:1rem;font-weight:900;
  cursor:pointer;line-height:1;
}
.content-del:hover{background:#a5d9d4;}

/* جدول قابل لإضافة الصفوف */
.dyn-table{
  width:100%;
  border-collapse:collapse;
  font-size:0.78rem;
}
.dyn-table thead{
  background:linear-gradient(135deg, #0b3946, #2c979d);
  color:#fff;
}
.dyn-table thead th{
  padding:8px 6px;
  font-weight:800;
  font-size:0.72rem;
  text-align:center;
  border:1px solid rgba(255,255,255,0.15);
}
.dyn-table tbody td{
  padding:5px 6px;
  border:1px solid rgba(11,57,70,0.18);
  background:#fff;
  vertical-align:middle;
}
.dyn-table tbody tr:nth-child(even) td{background:#f3f4ef;}
.dyn-table tbody td input,
.dyn-table tbody td textarea{
  width:100%;
  border:none;
  background:transparent;
  font-family:inherit;
  font-size:0.78rem;
  color:#16323a;
  outline:none;
  padding:3px 4px;
}
.dyn-table tbody td textarea{
  resize:none;
  overflow:hidden;
  min-height:24px;
  line-height:1.5;
  display:block;
  word-wrap:break-word;
  overflow-wrap:break-word;
  white-space:pre-wrap;
}
.dyn-table .row-num{
  font-weight:800;
  color:#0b3946;
  text-align:center;
  width:30px;
  font-size:0.72rem;
}
.dyn-table .del-btn{
  background:#0b3946;
  color:#fff;
  border:none;
  border-radius:50%;
  width:22px;
  height:22px;
  font-size:0.85rem;
  font-weight:900;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto;
}

.add-row-btn{
  margin-top:8px;
  width:100%;
  padding:8px;
  border:1.5px dashed #2c979d;
  background:transparent;
  border-radius:6px;
  font-family:inherit;
  font-weight:700;
  font-size:0.78rem;
  color:#0b3946;
  cursor:pointer;
  transition:all 0.2s;
}
.add-row-btn:hover{background:#f3f4ef;}

.signatures{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.sig-box{text-align:center;padding:8px;}
.sig-role{
  font-size:0.78rem;
  font-weight:800;
  color:#0b3946;
  margin-bottom:6px;
}
.sig-line{
  border-top:1.5px solid #0b3946;
  padding-top:5px;
}
.sig-line input{
  width:100%;
  border:none;
  background:transparent;
  font-family:inherit;
  font-size:0.82rem;
  font-weight:700;
  color:#16323a;
  text-align:center;
  outline:none;
}
.sig-line input::placeholder{color:#5a6a6e;opacity:0.55;}

.footer-band{
  background:linear-gradient(135deg, #0b3946, #2c979d);
  padding:10px 14px;
  text-align:center;
  color:#fff;
  font-size:0.7rem;
  font-weight:600;
}
.footer-band .heart{color:#69cee3;}

.action-bar{
  display:flex;
  gap:6px;
  background:linear-gradient(135deg, #072730, #0b3946);
  padding:10px;
  border-radius:50px;
  box-shadow:0 8px 24px rgba(11,57,70,0.15), 0 0 0 1px rgba(255,255,255,0.1);
  margin:18px auto 14px;
  width:fit-content;
  max-width:calc(100% - 28px);
  justify-content:center;
  flex-wrap:wrap;
}
.btn{
  display:flex;
  align-items:center;
  gap:5px;
  padding:10px 15px;
  border:none;
  border-radius:40px;
  font-family:'Tajawal',sans-serif;
  font-size:0.8rem;
  font-weight:700;
  cursor:pointer;
  background:#fff;
  color:#0b3946;
}
.btn-img{background:linear-gradient(135deg,#2a9d8f,#1a7a8a); color:#fff;}
.btn-pdf{background:linear-gradient(135deg,#d32f2f,#b71c1c); color:#fff;}
.btn-share{background:linear-gradient(135deg,#16a34a,#15803d); color:#fff;}
.btn-clear{background:transparent; color:#fff; border:1.5px solid rgba(255,255,255,0.35);}
.btn-lang{
  background:rgba(255,255,255,0.12);
  color:#fff;
  border:1.5px solid rgba(255,255,255,0.3);
  min-width:46px;
  justify-content:center;
}

#toast{
  position:fixed;
  top:18px;
  left:50%;
  transform:translateX(-50%);
  background:#0b3946;
  color:#fff;
  padding:11px 20px;
  border-radius:30px;
  font-weight:700;
  font-size:0.83rem;
  box-shadow:0 6px 20px rgba(0,0,0,0.25);
  opacity:0;
  pointer-events:none;
  transition:opacity 0.3s;
  z-index:1000;
}
#toast.show{opacity:1;}

.modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;
  z-index:999;padding:20px;
}
.modal-overlay.show{display:flex;}
.modal-box{
  background:#fff;border-radius:10px;padding:22px;
  max-width:360px;width:100%;text-align:center;
  border:1px solid #2c979d;
  box-shadow:0 14px 40px rgba(0,0,0,0.3);
}
.modal-box .ico{font-size:2rem;margin-bottom:8px;}
.modal-box p{font-weight:700;color:#0b3946;margin-bottom:16px;font-size:0.9rem;}
.modal-actions{display:flex;gap:8px;justify-content:center;}
.modal-actions button{
  padding:9px 20px;border:none;border-radius:6px;
  font-family:inherit;font-weight:700;cursor:pointer;font-size:0.85rem;
}
.modal-yes{background:#0b3946;color:#fff;}
.modal-no{background:#ddd;color:#333;}

/* photos */
.photos-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
.photo-slot{
  aspect-ratio:1/1;
  background:#f3f4ef;
  border:2px dashed rgba(11,57,70,0.18);
  border-radius:8px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.photo-slot:hover{border-color:#2c979d;border-style:solid;}
.photo-slot.has-image{border-style:solid;border-color:#2c979d;padding:3px;}
.photo-slot img{
  width:100%;height:100%;
  object-fit:cover;
  border-radius:5px;
  display:none;
}
.photo-slot.has-image img{display:block;}
.photo-empty{text-align:center;padding:6px;user-select:none;}
.photo-slot.has-image .photo-empty{display:none;}
.photo-icon{font-size:1.4rem;opacity:0.5;}
.photo-text{font-size:0.64rem;font-weight:800;color:#0b3946;margin-top:2px;}
.photo-rm{
  position:absolute;top:5px;left:5px;
  width:22px;height:22px;border-radius:50%;
  background:#0b3946;color:#fff;border:2px solid #fff;
  font-size:0.85rem;font-weight:900;cursor:pointer;
  display:none;align-items:center;justify-content:center;z-index:5;
}
.photo-slot.has-image .photo-rm{display:flex;}

@media (max-width:560px){
  body{padding:8px 0 90px;}
  #page{max-width:100%;border-radius:0;}
  .fields{grid-template-columns:1fr;}
  .signatures{grid-template-columns:1fr;}
  .title-ar{font-size:0.98rem;}
  .dyn-table{font-size:0.66rem;}
  .dyn-table thead th{padding:5px 3px;font-size:0.6rem;}
  .dyn-table tbody td{padding:3px 4px;}
  .btn{padding:9px 11px;font-size:0.74rem;}
  .btn span.txt{display:none;}
  .photos-grid{grid-template-columns:repeat(2,1fr);}
}

@media print{
  @page{size:A4;margin:8mm;}
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;}
  body{background:#fff !important;padding:0 !important;}
  #page{max-width:100% !important;box-shadow:none !important;}
  .action-bar,#toast,.modal-overlay{display:none !important;}
  .add-row-btn,.del-btn,.photo-rm{display:none !important;}
  .zone{page-break-inside:avoid;}
}

.icon-badge .moe-logo-badge{
  width:48px;
  height:auto;
  max-height:42px;
  object-fit:contain;
  display:block;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,0.15));
}
@media (max-width:560px){
  .icon-badge .moe-logo-badge{width:40px; max-height:34px;}
}


/* ═══════════════════════════════════════════════
   🏛️ ترويسة هوية وزارة التعليم (moe-band)
   مطابقة لقالب exam.html
   ═══════════════════════════════════════════════ */
.moe-band{
  position:relative;
  border-radius:6px 6px 0 0;
  overflow:hidden;
  box-shadow:0 8px 24px rgba(11,57,70,0.12);
}
.moe-band-line{
  height:6px;
  background:linear-gradient(90deg, #2782b1 0%, #2c979d 50%, #3ba87e 100%);
}
.moe-band-body{
  position:relative;
  background:linear-gradient(135deg, #072730 0%, #0b3946 55%, #072730 100%);
  padding:14px 22px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  overflow:hidden;
}
.moe-band-body::before{
  content:"";
  position:absolute; inset:0;
  background-image:radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size:14px 14px;
  pointer-events:none;
}
.moe-band-text{flex:1;text-align:right;position:relative;z-index:1;}
.moe-band-text .l1, .moe-band-text .l2, .moe-band-text .l3{
  color:#fff; font-weight:800; line-height:1.45;
}
.moe-band-text .l1{font-size:0.92rem; opacity:0.95;}
.moe-band-text .l2 input, .moe-band-text .l3 input{
  background:transparent;border:none;outline:none;color:#fff;
  font-family:inherit;font-weight:800;width:100%;padding:1px 2px;
}
.moe-band-text .l2 input{font-size:0.95rem;}
.moe-band-text .l3 input{font-size:0.85rem; opacity:0.92;}
.moe-band-text .l2 input::placeholder,
.moe-band-text .l3 input::placeholder{color:rgba(255,255,255,0.55);}
.moe-band-divider{width:1.5px;height:50px;background:rgba(255,255,255,0.3);flex-shrink:0;position:relative;z-index:1;}
.moe-band-logo{width:62px;height:62px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;z-index:1;}
.moe-band-logo img{max-width:62px;max-height:62px;width:auto;height:auto;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.25));}

/* شريط اسم المدرسة */
.moe-school-band{
  position:relative;
  background:#072730;
  padding:9px 22px;
  margin:0 0 14px;
  text-align:center;
  border-top:1px solid rgba(255,255,255,0.12);
  border-bottom:1px solid rgba(255,255,255,0.08);
  border-radius:0 0 6px 6px;
  box-shadow:0 8px 24px rgba(11,57,70,0.12);
}
.moe-school-band::before{
  content:"";
  position:absolute; inset:0;
  background-image:radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size:12px 12px;
  pointer-events:none;
  border-radius:inherit;
}
.moe-school-band input{
  position:relative; z-index:1;
  background:transparent; border:none; outline:none;
  color:#fff; font-family:inherit; font-weight:800;
  font-size:0.9rem; text-align:center;
  width:100%; max-width:480px; padding:2px 6px;
}
.moe-school-band input::placeholder{color:rgba(255,255,255,0.6);}

/* إخفاء النقش عند التصدير/الطباعة */
.exporting .moe-band-body::before,
.exporting .moe-school-band::before{display:none !important; content:none !important;}
@media print{
  .moe-band-body::before, .moe-school-band::before{display:none !important; content:none !important;}
}


/* ☁️ زر حفظ في حسابي - ذهبي فاخر تحفة */
.btn-cloud, .action-btn-cloud{
  background:linear-gradient(135deg, #f5d76e 0%, #e8c547 35%, #d4a657 100%) !important;
  color:#3d2200 !important;
  position:relative;
  overflow:hidden;
  font-weight:900 !important;
  text-shadow:0 1px 0 rgba(255,255,255,0.4);
  box-shadow:
    0 6px 20px rgba(232,197,71,0.5),
    0 0 0 1px rgba(255,255,255,0.3) inset,
    0 -2px 6px rgba(212,166,87,0.4) inset !important;
  border:1px solid rgba(212,166,87,0.5) !important;
}
.btn-cloud::before, .action-btn-cloud::before{
  content:'';
  position:absolute;
  top:0;left:-150%;
  width:80%;height:100%;
  background:linear-gradient(110deg, transparent 20%, rgba(255,255,255,0.6) 50%, transparent 80%);
  animation:cloudShimmer 2.5s infinite;
  pointer-events:none;
}
.btn-cloud::after, .action-btn-cloud::after{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse at top, rgba(255,255,255,0.4), transparent 70%);
  pointer-events:none;
}
@keyframes cloudShimmer{0%{left:-150%;}50%,100%{left:150%;}}
.btn-cloud:hover, .action-btn-cloud:hover{
  transform:translateY(-2px);
  box-shadow:
    0 10px 28px rgba(232,197,71,0.65),
    0 0 0 1px rgba(255,255,255,0.4) inset,
    0 -2px 6px rgba(212,166,87,0.5) inset !important;
  background:linear-gradient(135deg, #ffd966 0%, #f5d76e 35%, #e8c547 100%) !important;
}
.btn-cloud:active, .action-btn-cloud:active{transform:translateY(0);}
.btn-cloud span, .action-btn-cloud span{position:relative; z-index:1;}

</style>
</head>
<body>

<div id="toast"></div>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="ico">⚠️</div>
    <p id="modal-msg">هل أنت متأكد؟</p>
    <div class="modal-actions">
      <button class="modal-yes" id="modal-yes">نعم، احذف</button>
      <button class="modal-no" onclick="closeModal()">إلغاء</button>
    </div>
  </div>
</div>

<div id="page">
  <!-- ═══ ترويسة هوية وزارة التعليم (مطابقة لـ exam.html) ═══ -->
  <div class="moe-band" id="moe-band">
    <div class="moe-band-line"></div>
    <div class="moe-band-body">
      <div class="moe-band-text">
        <div class="l1">الإدارة العامة للتعليم</div>
        <div class="l2"><input type="text" id="moe-admin" placeholder="اسم المنطقة هنا"></div>
        <div class="l3"><input type="text" id="moe-office" placeholder="اسم مكتب التعليم هنا"></div>

<script>
const STORAGE_KEY = 'radio_report_v1';

let modalCallback = null;
function askClear(){
  document.getElementById('modal-msg').textContent = 'سيتم حذف كل البيانات. هل أنت متأكد؟';

function closeModal(){

}
document.getElementById('modal-yes').onclick = () => {

};

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function toggleLang(){
  showToast('🌐 الترجمة قريباً');
}

// ═══════════════════════════════════════════════
// فقرات المحتوى الديناميكية (مسمى + محتوى)
// ═══════════════════════════════════════════════
function addContentBlock(label='', content=''){
  // 🔒 حماية: الزائر/Free لا يستطيع إضافة فقرات (لكن نسمح للاستدعاءات الداخلية بقيم افتراضية)
  if (!label && !content && typeof window.checkPremiumFeature === 'function') {
    if (!window.checkPremiumFeature('إضافة فقرة')) return;
  }
  const list = document.getElementById('content-list');
  if(!list) return;
  const block = document.createElement('div');
  block.className = 'field field-full content-block';
  block.innerHTML = `
    <div class="content-head">
      <input type="text" class="content-label" placeholder="اسم الفقرة (مثال: آية القرآن الكريم)" value="">
      <button class="del-btn content-del" onclick="this.closest('.content-block').remove(); saveData();" title="حذف الفقرة">×</button>
    </div>
    <textarea class="content-text" rows="3" placeholder="اكتب محتوى الفقرة..."></textarea>
  `;
  list.appendChild(block);
  // ضبط القيم بأمان (تفادي مشاكل علامات الاقتباس)
  block.querySelector('.content-label').value = label;
  block.querySelector('.content-text').value = content;
  // ربط الحفظ التلقائي
  block.querySelectorAll('input, textarea').forEach(inp => inp.addEventListener('input', saveData));
  return block;
}

function getContentBlocks(){
  const blocks = [];
  document.querySelectorAll('#content-list .content-block').forEach(b => {
    blocks.push({
      label: b.querySelector('.content-label').value,
      content: b.querySelector('.content-text').value
    });
  });
  return blocks;
}

function saveData(){
  const data = {};
  document.querySelectorAll('input, textarea').forEach(el => {
    if(el.id) data[el.id] = el.value;
  });
  // فقرات المحتوى الديناميكية
  data['content_blocks'] = getContentBlocks();
  // photos
  document.querySelectorAll('.photo-slot').forEach((slot, i) => {
    if(slot.classList.contains('has-image')){
      const img = slot.querySelector('img');
      if(img) data['photo_'+i] = img.src;
    }
  });
  // dynamic rows
  const tables = document.querySelectorAll('.dyn-table tbody');
  tables.forEach((tb, ti) => {
    const rows = [];
    tb.querySelectorAll('tr').forEach(tr => {
      const cells = [];
      tr.querySelectorAll('input, textarea').forEach(inp => cells.push(inp.value));
      rows.push(cells);
    });
    data['table_'+ti] = rows;
  });
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e){}
}

function loadData(){
  let loaded = false;
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const d = JSON.parse(raw);
      loaded = true;
      // استعادة فقرات المحتوى الديناميكية
      if(Array.isArray(d['content_blocks'])){
        const list = document.getElementById('content-list');
        if(list) list.innerHTML = '';
        d['content_blocks'].forEach(b => addContentBlock(b.label || '', b.content || ''));
      }
      Object.keys(d).forEach(k => {
        if(k === 'content_blocks') return;
        if(k.startsWith('photo_')){
          const i = parseInt(k.split('_')[1]);
          const slots = document.querySelectorAll('.photo-slot');
          if(slots[i]){
            const img = slots[i].querySelector('img');
            if(img && d[k]){
              img.src = d[k];
              slots[i].classList.add('has-image');
            }
          }
        } else if(k.startsWith('table_')){
          // restore rows later if needed
        } else {
          const el = document.getElementById(k);
          if(el) el.value = d[k];
        }
      });
    }
  } catch(e){}

  // إذا ما فيه فقرات محفوظة، نضيف الفقرات الافتراضية
  const list = document.getElementById('content-list');
  if(list && list.querySelectorAll('.content-block').length === 0){
    addContentBlock('آية القرآن الكريم', '');
    addContentBlock('الحديث الشريف', '');
    addContentBlock('الكلمة/الموضوع الرئيسي', '');
  }
}

function doClear(){
  // 🔒 حماية: الزائر/Free لا يستطيع تفريغ البيانات
  if (typeof window.checkPremiumFeature === 'function') {
    if (!window.checkPremiumFeature('تفريغ البيانات')) return;
  }
  document.querySelectorAll('input, textarea').forEach(el => el.value = '');
  document.querySelectorAll('.photo-slot').forEach(slot => {
    slot.classList.remove('has-image');
    const img = slot.querySelector('img');
    if(img) img.src = '';
  });
  // إعادة فقرات المحتوى للوضع الافتراضي
  const list = document.getElementById('content-list');
  if(list){
    list.innerHTML = '';
    addContentBlock('آية القرآن الكريم', '');
    addContentBlock('الحديث الشريف', '');
    addContentBlock('الكلمة/الموضوع الرئيسي', '');
  }
  localStorage.removeItem(STORAGE_KEY);
  showToast('✅ تم تفريغ التقرير');
}

function loadJsPDF(){
  return new Promise((resolve, reject) => {
    if(typeof window.jspdf !== 'undefined'){ resolve(); return; }
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    script.onload = () => resolve();
    script.onerror = () => reject(new Error('jsPDF load failed'));
    document.head.appendChild(script);
  });
}

// ═══════════════════════════════════════════════
// 🔥 prepareForExport - معالجة inputs + textareas + contenteditable
// (يلف كل كلمة بـ span لمنع html2canvas من فصل الحروف عند wrap)
// ═══════════════════════════════════════════════
function prepareForExport(page){
  const replacements = [];

  // 0️⃣ إخفاء العناصر اللي ما تظهر في التصدير (الأزرار + الفوتر التفاعلي)
  const hideSelectors = '.action-bar, #toast, .modal-overlay, .add-row-btn, .del-btn, .photo-rm';
  page.querySelectorAll(hideSelectors).forEach(el => {
    replacements.push({orig:el, prevDisplay:el.style.display, type:'hide'});
    el.style.display = 'none';
  });

  // 1️⃣ معالجة inputs و textareas
  const inputs = page.querySelectorAll('input[type="text"], input[type="number"], textarea');
  inputs.forEach(el => {
    const computed = window.getComputedStyle(el);
    const value = el.value || '';
    const isTextarea = el.tagName === 'TEXTAREA';
    const span = document.createElement(isTextarea ? 'div' : 'span');
    if(value.trim()){
      const lines = isTextarea ? value.split('\n') : [value];
      span.innerHTML = lines.map(line => {
        const words = line.split(/(\s+)/);
        return words.map(p => {
          if(!p) return '';
          if(/^\s+$/.test(p)) return p;
          return `<span style="display:inline-block;white-space:nowrap;letter-spacing:0;direction:rtl;unicode-bidi:embed;">${p.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>`;
        }).join('');
      }).join('<br>');
    } else {
      span.innerHTML = '&nbsp;';
    }
    span.style.cssText = `display:${isTextarea?'block':'inline-block'};width:100%;box-sizing:border-box;font-family:${computed.fontFamily};font-size:${computed.fontSize};font-weight:${computed.fontWeight};color:${computed.color};text-align:${computed.textAlign};line-height:${computed.lineHeight};padding:${computed.padding};direction:rtl;unicode-bidi:embed;letter-spacing:0;min-height:${isTextarea?computed.minHeight:'auto'};`;
    el.style.display = 'none';
    el.parentNode.insertBefore(span, el);
    replacements.push({orig:el, span, type:'input'});
  });

  // 2️⃣ معالجة contenteditable للنصوص الطويلة
  const editables = page.querySelectorAll('[contenteditable="true"]');
  editables.forEach(el => {
    const text = el.textContent || '';
    if(!text.trim() || text.length < 30) return;
    const originalHTML = el.innerHTML;
    const lines = text.split('\n');
    let newHTML = '';
    lines.forEach((line, lineIdx) => {
      if(lineIdx > 0) newHTML += '<br>';
      const words = line.split(/(\s+)/);
      words.forEach(p => {
        if(!p) return;
        if(/^\s+$/.test(p)){ newHTML += p; }
        else { newHTML += `<span style="display:inline-block;white-space:nowrap;letter-spacing:0;direction:rtl;unicode-bidi:embed;">${p.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>`; }
      });
    });
    el.innerHTML = newHTML;
    replacements.push({orig:el, originalHTML, type:'editable'});
  });

  return replacements;
}

function restoreFromExport(replacements){
  replacements.forEach(({orig, span, originalHTML, prevDisplay, type}) => {
    if(type === 'hide'){
      orig.style.display = prevDisplay || '';
    } else if(type === 'editable'){
      if(originalHTML !== undefined) orig.innerHTML = originalHTML;
    } else {
      orig.style.display = '';
      if(span && span.parentNode) span.parentNode.removeChild(span);
    }
  });
}

  if (typeof window.checkDownloadAccess === 'function') {

// ═══════════════════════════════════════════════
// التصدير كـ PDF
// ═══════════════════════════════════════════════
async function exportAsPDFv2(){
  if (typeof window.checkDownloadAccess === 'function') {
    const allowed = await window.checkDownloadAccess();
    if (!allowed) return;
  }
  saveData();
  showToast('⏳ جاري تحضير PDF...');
  if(typeof window.jspdf === 'undefined'){
    try{ await loadJsPDF(); }catch(e){ showToast('❌ فشل التصدير'); return; }
  }
  const page = document.getElementById('page');
  const replacements = prepareForExport(page);
  try{
    await document.fonts.ready;
    await new Promise(r => setTimeout(r, 500));
    const canvas = await html2canvas(page, {
      backgroundColor:'#ffffff', scale:2.5, useCORS:true, logging:false, allowTaint:true,
      width:page.offsetWidth, height:page.offsetHeight,
      onclone:(doc) => {
        const style = doc.createElement('style');
        style.textContent = `*{letter-spacing:0 !important; font-kerning:normal !important;}`;
        doc.head.appendChild(style);
      }
    });
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({orientation:'portrait', unit:'mm', format:'a4', compress:true});
    const pdfWidth = 210, pdfHeight = 297;
    const marginX = 8, marginY = 8;
    const contentWidth = pdfWidth - (marginX*2);
    const contentHeight = pdfHeight - (marginY*2);
    const imgRatio = canvas.height / canvas.width;
    const imgWidthMM = contentWidth;
    const imgHeightMM = imgWidthMM * imgRatio;
    if(imgHeightMM <= contentHeight + 5){
      const imgData = canvas.toDataURL('image/jpeg', 0.92);
      const yPos = (pdfHeight - imgHeightMM) / 2;
      pdf.addImage(imgData, 'JPEG', marginX, yPos, imgWidthMM, imgHeightMM, undefined, 'FAST');
    } else {
      const pixelsPerPage = (contentHeight / imgHeightMM) * canvas.height;
      const totalPages = Math.ceil(canvas.height / pixelsPerPage);
      for(let i = 0; i < totalPages; i++){
        if(i > 0) pdf.addPage();
        const sourceY = i * pixelsPerPage;
        const sourceHeight = Math.min(pixelsPerPage, canvas.height - sourceY);
        const partCanvas = document.createElement('canvas');
        partCanvas.width = canvas.width;
        partCanvas.height = sourceHeight;
        partCanvas.getContext('2d').drawImage(canvas, 0, sourceY, canvas.width, sourceHeight, 0, 0, canvas.width, sourceHeight);
        const partData = partCanvas.toDataURL('image/jpeg', 0.92);
        const partHeightMM = (sourceHeight / canvas.width) * imgWidthMM;
        pdf.addImage(partData, 'JPEG', marginX, marginY, imgWidthMM, partHeightMM, undefined, 'FAST');
      }
    }
    pdf.setProperties({title:'الإذاعة_المدرسية', creator:'ksa2030.one'});
    
    // ═══ حفظ - منطق ذكي ═══
    const pdfBlob = pdf.output('blob');
    const pdfFile = new File([pdfBlob], 'الإذاعة_المدرسية.pdf', { type: 'application/pdf' });
    
    const shareText = '✨ تم إنشاؤه الرابط عبر :\n' +
                      '🌐 www.ksa2030.one\n' +
                      'التقارير الذكية — منصة تقارير المدرسة';
    
    const canShareFiles = navigator.share && navigator.canShare && navigator.canShare({ files: [pdfFile] });
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    
    if (canShareFiles && isMobile) {
      try {
        await navigator.share({
          files: [pdfFile],
          title: 'التقارير الذكية · ksa2030.one',
          text: shareText
        });
        showToast('✅ تم المشاركة');
      } catch(err) {
        if (err.name === 'AbortError') {
          showToast('تم الإلغاء');
        } else {
          pdf.save('الإذاعة_المدرسية.pdf');
          showToast('📥 تم تحميل PDF');
        }
      }
    } else {
      pdf.save('الإذاعة_المدرسية.pdf');
      setTimeout(() => showCopyTextModal(shareText), 600);
    }
  }catch(e){ console.error(e); showToast('❌ فشل التصدير'); }
  finally{ restoreFromExport(replacements); }
}

// ═══════════════════════════════════════════════
// 📤 مشاركة التقرير (Web Share API)
// ═══════════════════════════════════════════════
async function shareReport(){
  if (typeof window.checkDownloadAccess === 'function') {
    const allowed = await window.checkDownloadAccess();
    if (!allowed) return;
  }
  saveData();
  showToast('⏳ جاري تحضير المشاركة...');
  const page = document.getElementById('page');
  if(!page){ showToast('❌ لم يتم العثور على التقرير'); return; }
  const replacements = prepareForExport(page);
  try{
    await document.fonts.ready;
    await new Promise(r => setTimeout(r, 500));
    const canvas = await html2canvas(page, {
      backgroundColor:'#ffffff', scale:3, useCORS:true, logging:false, allowTaint:true,
      width:page.offsetWidth, height:page.offsetHeight,
      onclone:(doc) => {
        const style = doc.createElement('style');
        style.textContent = `*{letter-spacing:0 !important; font-kerning:normal !important;}`;
        doc.head.appendChild(style);
      }
    });
    restoreFromExport(replacements);
    canvas.toBlob(async (blob) => {
      const file = new File([blob], 'الإذاعة_المدرسية.png', { type: 'image/png' });
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        try{
          await navigator.share({ 
            files:[file], 
            title:'التقارير الذكية · ksa2030.one', 
            text:'✨ تم إنشاؤه الرابط عبر :\n' +
                 '🌐 www.ksa2030.one\n' +
                 'التقارير الذكية — منصة تقارير المدرسة'
          });
          showToast('✅ تم المشاركة');
        }catch(err){
          if(err.name !== 'AbortError'){ console.error(err); showToast('❌ فشل المشاركة'); }
        }
      } else {
        const link = document.createElement('a');
        link.download = 'الإذاعة_المدرسية.png';
        link.href = URL.createObjectURL(blob);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast('📥 تم التنزيل');
      }
    }, 'image/png');
  }catch(e){
    console.error(e); showToast('❌ فشل التصدير');
    restoreFromExport(replacements);
  }
}

// Photos
function pickPhoto(n){
  // 🔒 حماية: الزائر/Free لا يستطيع رفع الصور
  if (typeof window.checkPremiumFeature === 'function') {
    if (!window.checkPremiumFeature('رفع الصورة')) return;
  }
  document.getElementById('file-'+n).click();
}
function uploadPhoto(e, n){
  const file = e.target.files[0];
  if(!file || !file.type.startsWith('image/')) return;
  if(file.size > 3*1024*1024){ showToast('❌ الصورة كبيرة جداً'); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    const tmp = new Image();
    tmp.onload = () => {
      const c = document.createElement('canvas');
      const max = 900;
      let w = tmp.width, h = tmp.height;
      if(w > max || h > max){
        if(w > h){ h = h*(max/w); w = max; }
        else { w = w*(max/h); h = max; }
      }
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(tmp, 0, 0, w, h);
      const slot = document.querySelector(`.photo-slot[data-slot="${n}"]`);
      const img = document.getElementById('img-'+n);
      img.src = c.toDataURL('image/jpeg', 0.85);
      slot.classList.add('has-image');
      saveData();
      showToast('✅ تم رفع الصورة');
    };
    tmp.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}
function removePhoto(e, n){
  e.stopPropagation();
  const slot = document.querySelector(`.photo-slot[data-slot="${n}"]`);
  const img = document.getElementById('img-'+n);
  img.src = '';
  slot.classList.remove('has-image');
  saveData();
}

// Auto-resize helper for table textareas
function autoResizeTextarea(ta){
  ta.style.height = 'auto';
  ta.style.height = (ta.scrollHeight) + 'px';
}

// Dynamic table rows
function addRow(tableId, cols){
  // 🔒 حماية: الزائر/Free لا يستطيع إضافة صف
  if (typeof window.checkPremiumFeature === 'function') {
    if (!window.checkPremiumFeature('إضافة صف')) return;
  }
  const tbody = document.querySelector(`#${tableId} tbody`);
  const tr = document.createElement('tr');
  const rowNum = tbody.children.length + 1;
  let html = `<td class="row-num">${rowNum}</td>`;
  for(let i = 0; i < cols - 1; i++){
    html += `<td><textarea rows="1"></textarea></td>`;
  }
  html += `<td><button class="del-btn" onclick="this.closest('tr').remove(); updateRowNumbers('${tableId}'); saveData();">×</button></td>`;
  tr.innerHTML = html;
  tbody.appendChild(tr);
  tr.querySelectorAll('textarea').forEach(ta => {
    ta.addEventListener('input', () => { autoResizeTextarea(ta); saveData(); });
    autoResizeTextarea(ta);
  });
  saveData();
}
function updateRowNumbers(tableId){
  document.querySelectorAll(`#${tableId} tbody tr`).forEach((tr, i) => {
    const num = tr.querySelector('.row-num');
    if(num) num.textContent = i + 1;
  });
}

document.querySelectorAll('input, textarea').forEach(el => {
  el.addEventListener('input', saveData);
});

// 🆕 Auto-resize للـ textareas في الجدول (يكبر مع المحتوى تلقائياً)
document.querySelectorAll('.dyn-table tbody textarea').forEach(ta => {
  ta.addEventListener('input', () => autoResizeTextarea(ta));
});

setTimeout(() => {
  document.querySelectorAll('.dyn-table tbody textarea').forEach(ta => {
    autoResizeTextarea(ta);
  });
}, 100);

// ═══════════════════════════════════════════════
// 🔒 وضع المعاينة - حماية ثلاثية الطبقات
// (الزائر/Free يشاهد فقط، لا يكتب ولا يحمّل)
// ═══════════════════════════════════════════════
(function() {
  // Layer 1: CSS - تعطيل التفاعل بصرياً
  const styleEl = document.createElement('style');
  styleEl.textContent = `
    body.locked-preview input,
    body.locked-preview textarea,
    body.locked-preview [contenteditable] {
      pointer-events: none !important;
      caret-color: transparent !important;
      user-select: none !important;
      -webkit-user-select: none !important;
    }
    body.locked-preview .photo-slot,
    body.locked-preview .photo-slot *,
    body.locked-preview .content-del,
    body.locked-preview .del-btn {
      pointer-events: none !important;
    }
  `;
  document.head.appendChild(styleEl);
  document.body.classList.add('locked-preview');
  let _locked = true;
  console.log('🔒 وضع المعاينة مفعّل');

  // Layer 2: Capture events (6 listeners)
  const capture = (e) => {
    if (!_locked) return;
    const target = e.target.closest('input, textarea, [contenteditable], .photo-slot, .content-del, .del-btn');
    if (!target) return;
    if (target.tagName === 'INPUT' && target.type === 'file') return;
    e.preventDefault();
    e.stopPropagation();
    if (typeof window.showPremiumFeatureModal === 'function') {
      const isImage = target.classList.contains('photo-slot') ||
                       target.closest('.photo-slot');
      window.showPremiumFeatureModal(isImage ? 'رفع الصورة' : 'الكتابة في الإذاعة');
    }
    return false;
  };
  ['click', 'touchstart', 'focusin', 'keydown', 'paste', 'beforeinput'].forEach(evt => {
    document.addEventListener(evt, capture, { capture: true });
  });

  // Layer 3: Wrap doClear to prevent reset
  const wrapClear = () => {
    if (typeof window.doClear === 'function' && !window.doClear.__wrapped) {
      const original = window.doClear;
      window.doClear = function() {
        if (_locked) {
          if (typeof window.showPremiumFeatureModal === 'function') {
            window.showPremiumFeatureModal('تفريغ البيانات');
          }
          return;
        }
        return original.apply(this, arguments);
      };
      window.doClear.__wrapped = true;
    }
  };
  wrapClear();
  setTimeout(wrapClear, 1000);

  // Watcher: راقب حالة الاشتراك كل 200ms (max 75 attempts = 15s)
  let attempts = 0;
  const watcher = setInterval(() => {
    attempts++;
    if (attempts > 75) {
      clearInterval(watcher);
      return;
    }
    if (typeof window.isPremiumUser === 'function' && window.isPremiumUser()) {
      _locked = false;
      document.body.classList.remove('locked-preview');
      clearInterval(watcher);
      console.log('✅ فُك القفل - مستخدم مشترك');
    }
  }, 200);
})();
</script>

<script>
async function saveToMyProfile() {
  if (typeof window.getFirebaseUser !== 'function' || !window.getFirebaseUser()) {
    if (typeof showToast === 'function') showToast('⚠️ سجّل دخولك أولاً');
    setTimeout(() => { window.location.href = 'login.html?next=radio.html'; }, 1500);
    return;
  }
  
  const loader = document.createElement('div');
  loader.id = '_saveLoader';
  loader.style.cssText = `
    position:fixed;inset:0;background:rgba(5,10,18,0.92);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    z-index:99999;display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:20px;
  `;
  loader.innerHTML = `
    <div style="width:60px;height:60px;border:5px solid rgba(232,197,71,0.2);border-top-color:#e8c547;border-radius:50%;animation:_sl 0.8s linear infinite;"></div>
    <div style="font:800 1.05rem 'Tajawal',sans-serif;color:#fff;text-align:center;padding:0 20px;">
      ☁️ جاري حفظ التقرير في حسابك...
    </div>
    <style>@keyframes _sl{to{transform:rotate(360deg);}}</style>
  `;
  document.body.appendChild(loader);
  
  try {
    await saveExportToCloud('save');
    loader.style.opacity = '0';
    loader.style.transition = 'opacity 0.3s';
    setTimeout(() => loader.remove(), 300);
    if (typeof showToast === 'function') showToast('✅ تم حفظ التقرير في حسابك');
  } catch (e) {
    console.error('❌:', e);
    loader.remove();
    if (typeof showToast === 'function') showToast('❌ ' + e.message);
  }
}

async function saveExportToCloud(format = 'save') {
  if (typeof window.trackExport !== 'function') {
    for (let i = 0; i < 100; i++) {
      await new Promise(r => setTimeout(r, 100));
      if (typeof window.trackExport === 'function') break;
    }
    if (typeof window.trackExport !== 'function') throw new Error('Firebase غير جاهز');
  }
  
  const content = {};
  
  // كل inputs و textareas
  document.querySelectorAll('input, textarea, select').forEach((el, i) => {
    if (el.type === 'file' || el.type === 'button' || el.type === 'submit' || 
        el.type === 'reset' || el.type === 'checkbox' || el.type === 'radio') return;
    const val = (el.value || '').toString().trim();
    if (val) {
      const key = el.id || el.name || `input_${i}`;
      content[key] = val;
    }
  });
  
  // contenteditable
  document.querySelectorAll('[contenteditable="true"]').forEach((el, i) => {
    const text = (el.innerText || el.textContent || '').trim();
    if (text && text !== '...' && text !== '-') {
      let key = el.id || el.dataset?.field;
      if (!key && el.className) {
        const cls = el.className.split(' ').filter(c => c && c !== 'editable').join('-');
        if (cls) key = 'ce-' + cls;
      }
      if (!key) key = `editable_${i}`;
      content[key] = text;
    }
  });
  
  // الصور من DOM مباشرة
  document.querySelectorAll('img').forEach((img, i) => {
    if (img.src && img.src.startsWith('data:image/')) {
      let key = img.id;
      if (!key) {
        const parent = img.closest('[data-slot]');
        if (parent) key = '__shahed-' + parent.getAttribute('data-slot');
      }
      if (!key) key = `img_${i}`;
      content[key] = img.src;
    }
  });
  
  // الثيم
  const theme = document.body.getAttribute('data-theme');
  if (theme) content['__theme'] = theme;
  
  console.log('📊 الحقول:', Object.keys(content).length);
  
  let totalSize = Math.round(JSON.stringify(content).length / 1024);
  console.log('📊 الحجم:', totalSize, 'KB');
  
  // ضغط الصور لو الحجم كبير
  if (totalSize > 900) {
    const passes = [
      { w: 800, q: 0.7 },
      { w: 500, q: 0.5 },
      { w: 350, q: 0.4 },
      { w: 250, q: 0.3 }
    ];
    
    const imageKeys = Object.keys(content).filter(k => {
      const v = content[k];
      return typeof v === 'string' && v.startsWith('data:image/');
    });
    
    for (const pass of passes) {
      for (const key of imageKeys) {
        try {
          content[key] = await compressImageAsync(content[key], pass.w, pass.q);
        } catch(e) {}
      }
      totalSize = Math.round(JSON.stringify(content).length / 1024);
      console.log(`📉 ${pass.w}px: ${totalSize} KB`);
      if (totalSize < 900) break;
    }
  }
  
  const result = await window.trackExport({
    type: 'radio',
    title: 'الإذاعة المدرسية',
    format: format,
    content: content
  });
  
  if (result === true || (result && result.success === true)) {
    return true;
  }
  throw new Error('فشل الحفظ');
}

function compressImageAsync(dataUrl, maxWidth = 600, quality = 0.6) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = function() {
      try {
        let { width, height } = img;
        if (width > maxWidth) {
          height = Math.round(height * (maxWidth / width));
          width = maxWidth;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      } catch (e) { reject(e); }
    };
    img.onerror = () => reject(new Error('فشل تحميل الصورة'));
    img.src = dataUrl;
  });
}

(function tryRestoreFromCloud(){
  const params = new URLSearchParams(window.location.search);
  if (params.get('restore') !== '1') return;
  
  try {
    const stored = localStorage.getItem('ksa_restore_export');
    if (!stored) {
      if (window.history) window.history.replaceState({}, '', window.location.pathname);
      return;
    }
    
    const data = JSON.parse(stored);
    if (!data.content) return;
    
    const loader = document.createElement('div');
    loader.id = '_restoreLoader';
    loader.style.cssText = `
      position:fixed;inset:0;background:rgba(5,10,18,0.95);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      z-index:99999;display:flex;align-items:center;justify-content:center;
      flex-direction:column;gap:20px;
    `;
    loader.innerHTML = `
      <div style="width:60px;height:60px;border:5px solid rgba(232,197,71,0.2);border-top-color:#e8c547;border-radius:50%;animation:_rs 0.8s linear infinite;"></div>
      <div style="font:800 1.1rem 'Tajawal',sans-serif;color:#fff;">⏳ جاري الاستعادة...</div>
      <style>@keyframes _rs{to{transform:rotate(360deg);}}</style>
    `;
    document.body.appendChild(loader);
    
    let restored = 0;
    Object.entries(data.content).forEach(([key, value]) => {
      if (!value) return;
      
      // الصور
      if (key.startsWith('__shahed-') || (typeof value === 'string' && value.startsWith('data:image/'))) {
        const sid = key.replace('__shahed-', '');
        // جرب data-slot أولاً
        let slot = document.querySelector(`[data-slot="${sid}"]`);
        if (slot) {
          const img = slot.querySelector('img');
          if (img) {
            slot.classList.add('has-image');
            img.src = value;
            img.style.display = 'block';
            const ph = slot.querySelector('.shahed-slot-placeholder, .placeholder');
            if (ph) ph.style.display = 'none';
            restored++;
            return;
          }
        }
        // جرب ID
        const imgEl = document.getElementById(key);
        if (imgEl && imgEl.tagName === 'IMG') {
          imgEl.src = value;
          imgEl.style.display = 'block';
          restored++;
          return;
        }
      }
      
      if (key === '__theme') {
        document.body.setAttribute('data-theme', value);
        return;
      }
      
      // الحقول
      let el = document.getElementById(key);
      if (!el) el = document.querySelector(`[name="${key}"]`);
      if (!el && key.startsWith('ce-')) {
        const cls = key.substring(3);
        el = document.querySelector(`.${cls}.editable[contenteditable="true"]`)
          || document.querySelector(`[contenteditable="true"].${cls.split('-')[0]}`);
      }
      if (el) {
        if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT') {
          el.value = value;
        } else {
          el.innerText = value;
        }
        restored++;
      }
    });
    
    localStorage.removeItem('ksa_restore_export');
    if (window.history) window.history.replaceState({}, '', window.location.pathname);
    
    setTimeout(() => {
      loader.style.transition = 'opacity 0.4s';
      loader.style.opacity = '0';
      setTimeout(() => loader.remove(), 400);
      if (typeof showToast === 'function' && restored > 0) {
        showToast(`✅ تمت استعادة ${restored} عنصر`);
      }
    }, 500);
  } catch (e) {
    console.warn('فشل:', e);
    const loader = document.getElementById('_restoreLoader');
    if (loader) loader.remove();
  }
})();
