<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>تقرير الإدارة العامة للتعليم</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

html,body{font-family:‘Tajawal’,sans-serif;background:#dde8ea;width:100%;overflow-x:hidden;}

#page{width:100vw;max-width:520px;margin:0 auto;background:#fff;overflow:hidden;}

/* HEADER */
.hdr{background:linear-gradient(135deg,#1a3c4e,#1e5060,#2a6878);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
.hdr-text h2{font-size:0.82rem;font-weight:900;color:#fff;line-height:1.5;}
.hdr-text h2 span{color:#7ecfcf;}
.moe{display:flex;flex-direction:column;align-items:flex-start;gap:2px;}
.dots{display:grid;grid-template-columns:repeat(5,6px);gap:2px;}
.dot{width:6px;height:6px;border-radius:50%;background:#fff;}
.dot:nth-child(-n+2){opacity:.25;}.dot:nth-child(6){opacity:.25;}.dot:nth-child(11){opacity:.2;}.dot:nth-child(16){opacity:.15;}.dot:nth-child(21){opacity:.1;}
.moe-ar{font-size:0.7rem;font-weight:700;color:#fff;white-space:nowrap;}
.moe-en{font-size:0.46rem;color:rgba(255,255,255,.65);white-space:nowrap;}
.stripe{height:5px;background:linear-gradient(to left,#4caf8a,#2a9d8f,#1a6e8a);}

/* TITLE BARS */
.tbar{background:linear-gradient(135deg,#2a9d8f,#1a7a8a);margin:8px 10px 3px;border-radius:4px;padding:7px 12px;font-size:0.8rem;font-weight:700;color:#fff;text-align:center;min-height:28px;outline:none;cursor:text;}
.tbar:empty::before{content:attr(data-ph);opacity:.4;}
.sbar{background:#e4f4f4;margin:0 10px 6px;border-radius:4px;padding:5px 12px;font-size:0.72rem;font-weight:700;color:#1a6e8a;text-align:center;min-height:22px;outline:none;cursor:text;border:1px dashed rgba(42,157,143,.3);}
.sbar:empty::before{content:attr(data-ph);opacity:.4;}

/* ── TABLE LAYOUT (never wraps on any screen) ── */
.tbl{display:table;width:100%;table-layout:fixed;padding:4px 8px 6px;border-collapse:separate;border-spacing:5px 0;}
.col-L{display:table-cell;width:46%;vertical-align:top;}
.col-R{display:table-cell;width:54%;vertical-align:top;}

/* PHOTOS PANEL */
.ppanel{border:1.5px solid #9ecece;border-radius:8px;overflow:hidden;background:#d4eeee;}
.phdr{background:rgba(255,255,255,.28);padding:4px 8px;font-size:0.62rem;font-weight:700;color:#1a6e8a;border-bottom:1px solid #9ecece;display:flex;align-items:center;gap:5px;justify-content:center;}
.phdr-dot{width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,#2a9d8f,#1a6e8a);}
.pinner{padding:5px;display:flex;flex-direction:column;gap:4px;}

.pf{width:100%;padding-top:62%;position:relative;border-radius:6px;background:linear-gradient(135deg,#5bb8c4,#2a9d8f,#1a7a8a);cursor:pointer;overflow:hidden;}
.pf img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;border-radius:6px;}
.pwm{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.pwm svg{width:55%;height:55%;opacity:.18;}
.padd{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:0.5rem;color:rgba(255,255,255,.7);pointer-events:none;}
.psp{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;}
@keyframes sp{to{transform:translate(-50%,-50%) rotate(360deg);}}

.princ-wrap{padding:5px 6px 6px;border-top:1px solid #9ecece;}
.princ-lbl{text-align:center;font-size:0.58rem;font-weight:700;color:#1a6e8a;margin-bottom:3px;}
.princ-box{border:1px solid #9ecece;border-radius:4px;background:#fff;padding:4px 6px;min-height:22px;}
.princ-box input{border:none;outline:none;font-family:‘Tajawal’,sans-serif;font-size:0.62rem;color:#1a3c4e;background:transparent;text-align:center;width:100%;caret-color:#2a9d8f;}
.princ-box input::placeholder{color:rgba(26,62,78,.3);}

/* FIELD ROWS */
.fr{border:1px solid #9ecece;border-radius:4px;padding:4px 6px;display:flex;align-items:baseline;gap:2px;min-height:24px;background:#fff;margin-bottom:4px;}
.fl{font-size:0.57rem;font-weight:700;color:#1a3c4e;white-space:nowrap;flex-shrink:0;}
.fi{border:none;outline:none;font-family:‘Tajawal’,sans-serif;font-size:0.6rem;color:#1a3c4e;background:transparent;text-align:right;flex:1;width:0;min-width:0;caret-color:#2a9d8f;}
.fi::placeholder{color:rgba(26,62,78,.28);}
.fi[readonly]{color:#1a6e8a;font-weight:700;}
.fp{display:none;font-family:‘Tajawal’,sans-serif;font-size:0.6rem;color:#1a3c4e;flex:1;text-align:right;}

.fr-tall{border:1px solid #9ecece;border-radius:4px;padding:4px 6px;flex-direction:column;min-height:58px;background:#fff;margin-bottom:4px;}
.fr-tall .fl{margin-bottom:2px;}
.fr-tall textarea{border:none;outline:none;font-family:‘Tajawal’,sans-serif;font-size:0.6rem;color:#1a3c4e;background:transparent;text-align:right;width:100%;resize:none;min-height:44px;line-height:1.55;caret-color:#2a9d8f;}
.fr-tall textarea::placeholder{color:rgba(26,62,78,.28);}
.fp-blk{display:none;font-family:‘Tajawal’,sans-serif;font-size:0.6rem;color:#1a3c4e;white-space:pre-wrap;word-break:break-word;text-align:right;width:100%;line-height:1.55;}

.footer-stripe{height:7px;background:linear-gradient(to left,#4caf8a,#2a9d8f,#1a6e8a,#1a3c4e);}

/* ACTION BAR */
.action-bar{width:100%;max-width:520px;margin:0 auto;display:flex;gap:8px;padding:10px 10px 20px;}
.btn{flex:1;padding:13px 8px;border:none;border-radius:10px;font-family:‘Tajawal’,sans-serif;font-weight:700;cursor:pointer;font-size:0.85rem;transition:transform .15s,opacity .15s;}
.btn:active{transform:scale(.97);opacity:.85;}
.btn-teal{background:linear-gradient(135deg,#2a9d8f,#1a7a8a);color:#fff;}
.btn-gray{background:rgba(26,62,78,.1);color:#1a3c4e;border:1px solid rgba(26,62,78,.15);}

#toast{position:fixed;bottom:75px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(26,62,78,.95);border:1px solid #2a9d8f;color:#fff;padding:7px 18px;border-radius:30px;font-size:0.75rem;font-family:‘Tajawal’,sans-serif;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;white-space:nowrap;z-index:999;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

#modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center;}
#modal-ov.show{display:flex;}
.mbox{background:#fff;border:2px solid #2a9d8f;border-radius:12px;padding:20px 16px;text-align:center;max-width:260px;width:88%;font-family:‘Tajawal’,sans-serif;}
.mbox p{margin:0 0 14px;font-size:0.85rem;color:#1a3c4e;line-height:1.5;}
.mbox-btns{display:flex;gap:8px;}
.mbox-btns .btn{padding:10px;font-size:0.78rem;}
</style>

</head>

<div class="action-bar">
  <button class="btn btn-gray" onclick="confirmClear()">تفريغ</button>
  <button class="btn btn-teal" onclick="saveImg()">⬇ تحميل التقرير</button>
</div>

<div id="toast"></div>
<div id="modal-ov">
  <div class="mbox">
    <p>هل أنت متأكد من تفريغ جميع البيانات والصور؟</p>
    <div class="mbox-btns">
      <button class="btn btn-gray" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-teal" onclick="doClear()">تأكيد</button>
    </div>
  </div>
</div>

<script>
(function(){
  const n=new Date();
  document.getElementById('f-date').value=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
})();

document.getElementById('muhafaza').addEventListener('click',function(){
  const cur=this.textContent.replace('بمحافظة ','').trim();
  const v=prompt('اسم المحافظة:',cur==='...'?'':cur);
  if(v!==null) this.textContent='بمحافظة '+(v||'...');
});

function openF(id){document.getElementById('i'+id).click();}
function prev(inp,id){
  if(!inp.files||!inp.files[0])return;
  const sp=document.getElementById('sp'+id),img=document.getElementById('p'+id);
  sp.style.display='block';
  const r=new FileReader();
  r.onload=e=>{
    img.src=e.target.result;img.style.display='block';sp.style.display='none';
    img.closest('.pf').querySelector('.pwm').style.opacity='0';
    img.closest('.pf').querySelector('.padd').style.display='none';
  };
  r.readAsDataURL(inp.files[0]);
}

function toast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

function confirmClear(){document.getElementById('modal-ov').classList.add('show');}
function closeModal(){document.getElementById('modal-ov').classList.remove('show');}
function doClear(){
  closeModal();
  ['f-exec','f-place','f-bene','f-count','f-goals','f-desc','f-princ'].forEach(id=>document.getElementById(id).value='');
  const n=new Date();
  document.getElementById('f-date').value=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
  [1,2,3].forEach(id=>{
    const img=document.getElementById('p'+id);
    img.style.display='none';img.src='';
    document.getElementById('i'+id).value='';
    img.closest('.pf').querySelector('.pwm').style.opacity='';
    img.closest('.pf').querySelector('.padd').style.display='';
  });
  document.querySelectorAll('[contenteditable]').forEach(el=>el.textContent='');
  document.getElementById('muhafaza').textContent='بمحافظة ...';
  toast('تم تفريغ البيانات');
}

async function saveImg(){
  const page=document.getElementById('page');
  const iF=[['f-exec','pt-exec'],['f-place','pt-place'],['f-bene','pt-bene'],['f-count','pt-count'],['f-date','pt-date'],['f-princ','pt-princ']];
  iF.forEach(([a,b])=>{const i=document.getElementById(a),p=document.getElementById(b);p.textContent=i.value||'';i.style.display='none';p.style.display='inline';});
  const bF=[['f-goals','pt-goals'],['f-desc','pt-desc']];
  bF.forEach(([a,b])=>{const i=document.getElementById(a),p=document.getElementById(b);p.textContent=i.value||'';i.style.display='none';p.style.display='block';});
  toast('⏳ جاري التحضير...');
  try{
    const c=await html2canvas(page,{backgroundColor:'#fff',scale:3,useCORS:true,logging:false});
    const l=document.createElement('a');l.download='تقرير_التعليم.png';l.href=c.toDataURL('image/png');l.click();
    toast('✅ تم التحميل بنجاح');
  }catch(e){toast('❌ حدث خطأ');}
  iF.forEach(([a,b])=>{document.getElementById(a).style.display='';document.getElementById(b).style.display='none';});
  bF.forEach(([a,b])=>{document.getElementById(a).style.display='';document.getElementById(b).style.display='none';});
}
</script>
